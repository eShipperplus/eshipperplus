function handleLocationCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const rows = parseCSV(e.target.result);
      if (!rows.length) { toast('CSV is empty or has no data rows'); return; }
      const headers = Object.keys(rows[0]);

      // Columns where every row is empty → associate fills these in (capture fields)
      // Columns where at least one row has a value → reference data shown as context
      const refCols = headers.filter(h => rows.some(r => (r[h] || '').trim()));
      const captureCols = headers.filter(h => rows.every(r => !(r[h] || '').trim()));

      // Store capture cols globally so submitCreateJob can include them
      window._csvCaptureCols = captureCols;

      const nameCol = refCols.find(h => /^location$/i.test(h.trim())) || refCols[0] || headers[0];
      const list = document.getElementById('cj-locations-list');
      list.innerHTML = '';
      rows.forEach((row, i) => {
        const name = (row[nameCol] || '').trim() || `Row ${i + 1}`;
        const referenceData = {};
        refCols.forEach(h => { referenceData[h] = row[h] || ''; });
        const refSummary = refCols.map(h => `<span style="color:var(--text-light)">${h}:</span> ${row[h]||'—'}`).join(' &nbsp;·&nbsp; ');
        const div = document.createElement('div');
        div.className = 'loc-row';
        div.dataset.locJson = JSON.stringify({ name, referenceData });
        div.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:5px;background:#f7f8fc;font-size:12px';
        div.innerHTML = `<div style="flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${refSummary}</div>
          <button type="button" onclick="this.closest('.loc-row').remove()" style="background:none;border:none;color:var(--text-light);font-size:16px;cursor:pointer;flex-shrink:0">✕</button>`;
        list.appendChild(div);
      });
      const info = document.getElementById('cj-loc-csv-info');
      if (info) {
        let msg = `${rows.length} locations loaded`;
        if (refCols.length) msg += ` — context: ${refCols.join(', ')}`;
        if (captureCols.length) msg += ` — associate fills in: ${captureCols.join(', ')}`;
        info.style.cssText = 'font-size:12px;margin-bottom:8px;padding:8px;background:#ebf8ff;border-radius:6px;display:block';
        info.textContent = msg;
      }
      toast(`${rows.length} locations loaded`);
    } catch(err) { toast('CSV parse error: ' + err.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

// ── Upload locations CSV to an existing job ──
async function uploadLocationsToJob(jobId, input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  const text = await file.text();
  let rows;
  try { rows = parseCSV(text); } catch(err) { toast('CSV parse error: ' + err.message); return; }
  if (!rows.length) { toast('CSV is empty'); return; }

  const headers = Object.keys(rows[0]);
  const refCols = headers.filter(h => rows.some(r => (r[h] || '').trim()));
  const captureCols = headers.filter(h => rows.every(r => !(r[h] || '').trim()));
  const nameCol = refCols.find(h => /^location$/i.test(h.trim())) || refCols[0] || headers[0];

  const newLocs = rows.map((row, i) => {
    const name = (row[nameCol] || '').trim() || `Row ${i + 1}`;
    const referenceData = {};
    refCols.forEach(h => { referenceData[h] = row[h] || ''; });
    return { id: 'loc_' + Date.now() + '_' + i, name, referenceData, csvCaptureFields: captureCols };
  });

  const job = state.data.jobs.find(j => j.id === jobId);
  const existing = job?.locations || [];
  const merged = [...existing, ...newLocs];

  try {
    await apiFetch(`/api/jobs/${jobId}/locations`, {
      method: 'PUT',
      body: JSON.stringify({ locations: merged }),
    });
    await loadData();
    document.querySelector('.modal-overlay')?.remove();
    renderView();
    let msg = `${newLocs.length} location(s) added`;
    if (captureCols.length) msg += ` — associates fill in: ${captureCols.join(', ')}`;
    toast(msg, 4000);
  } catch(err) { toast('Error: ' + err.message, 3000); }
}

// ── Create job ──
async function submitCreateJob(e) {
  e.preventDefault();
  const form = e.target;
  const jobTypeId = form.jobTypeId.value;
  const customerId = form.customerId.value;
  if (!jobTypeId || !customerId) { toast('Select customer and job type'); return; }

  // Validate required job type fields
  const fields = getJobFields(jobTypeId);
  const fieldsContainer = document.getElementById('cj-job-fields');
  for (const f of fields.filter(f => f.required)) {
    const grp = fieldsContainer?.querySelector(`[data-field-id="${f.id}"]`);
    if (grp && grp.style.display === 'none') continue; // hidden by condition
    const el = fieldsContainer?.querySelector(`[name="${f.id}"]`);
    if (!el || !el.value.trim()) {
      toast(`"${f.label}" is required`);
      el?.focus();
      return;
    }
  }

  const fieldVals = fieldsContainer ? collectFields(fieldsContainer, fields) : {};

  const locationRows = [...document.querySelectorAll('#cj-locations-list .loc-row')];
  const locations = locationRows.map((row, i) => {
    if (row.dataset.locJson) {
      const d = JSON.parse(row.dataset.locJson);
      return { id: 'loc_' + Date.now() + '_' + i, name: d.name, instructions: d.instructions || '', referenceData: d.referenceData || {} };
    }
    const name = row.querySelector('.loc-name')?.value.trim() || '';
    const instructions = row.querySelector('.loc-instr')?.value.trim() || '';
    return { id: 'loc_' + Date.now() + '_' + i, name, instructions, referenceData: {} };
  }).filter(l => l.name);

  const body = {
    jobTypeId,
    customerId,
    fields: fieldVals,
    assignedManagerId: form.assignedManagerId.value || null,
    billable: ['admin','manager'].includes(state.user.role) ? (form.billable?.checked ?? true) : true,
    dueDate: form.dueDate.value || null,
    notes: form.notes.value,
    instructions: form.instructions.value,
    locations,
    csvCaptureFields: (window._csvCaptureCols || []).map(name => ({
      id: name.toLowerCase().replace(/\s+/g, '_'),
      label: name,
      type: 'text',
    })),
  };
  try {
    await apiFetch('/api/jobs', { method: 'POST', body: JSON.stringify(body) });
    toast('Job created');
    await loadData();
    renderView();
  } catch (err) {
    toast('Error: ' + err.message, 3000);
  }
}

// ── Job Attachments ──
async function uploadJobAttachment(jobId, input) {
  const file = input.files[0];
  if (!file) return;
  const MAX = 15 * 1024 * 1024;
  if (file.size > MAX) { toast('File too large (max 15 MB)', 3000); input.value = ''; return; }
  toast('Uploading…', 15000);
  try {
    // Use FileReader to avoid call stack overflow on large files (btoa spread fails >~1MB)
    const b64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
    await apiFetch(`/api/jobs/${jobId}/attachments`, {
      method: 'POST',
      body: JSON.stringify({ name: file.name, mimeType: file.type, size: file.size, data: b64 }),
    });
    toast('Attachment uploaded ✓');
    // Close current modal and re-open refreshed
    document.querySelector('.modal-overlay')?.remove();
    await loadData();
    renderView();
    openJobModal(jobId);
  } catch(err) {
    toast('Upload failed: ' + err.message, 4000);
  }
  input.value = '';
}

}

async function submitEditJob(jobId) {
  const job = state.data.jobs.find(j => j.id === jobId);
  if (!job) return;
  const fields = getJobFields(job.jobTypeId);
  const form = document.getElementById('ej-fields-form');
  const fieldVals = collectFields(form, fields);
  const body = {
    fields: fieldVals,
    notes: document.getElementById('ej-notes')?.value.trim() || '',
    billable: state.user.role==='admin' ? (document.getElementById('ej-billable')?.checked ?? true) : undefined,
    dueDate: document.getElementById('ej-due')?.value || null,
  };
  // Update customer if changed
  const newCustomer = document.getElementById('ej-customer')?.value;
  if (newCustomer && newCustomer !== job.customerId) body.customerId = newCustomer;

  // Collect logiwaEnabled override if toggle is present
  const logiwaEl = document.getElementById('ej-logiwa-enabled');
  if (logiwaEl !== null) body.logiwaEnabled = logiwaEl.checked;

  // Collect selected associates
  const selectedAssocIds = [...document.querySelectorAll('.ej-assoc-cb:checked')].map(cb => cb.value);

  try {
    await apiFetch(`/api/jobs/${jobId}`, { method: 'PUT', body: JSON.stringify(body) });

    // Assign manager if changed
    const newMgr = document.getElementById('ej-manager')?.value;
    if (newMgr !== undefined && newMgr !== job.assignedManagerId) {
      if (newMgr) await apiFetch(`/api/jobs/${jobId}/assign-manager`, { method: 'PUT', body: JSON.stringify({ managerId: newMgr }) }).catch(()=>{});
    }

    // Assign associates (always send the full updated list)
    const prevIds = job.assignedAssocId || [];
    const changed = selectedAssocIds.length !== prevIds.length || selectedAssocIds.some(id => !prevIds.includes(id));
    if (changed && selectedAssocIds.length > 0) {
      await apiFetch(`/api/jobs/${jobId}/assign-associate`, {
        method: 'PUT',
        body: JSON.stringify({ associateIds: selectedAssocIds }),
      });
    }

    await loadData();
    document.querySelector('.modal-overlay')?.remove();
    renderView();
    toast('Job updated');
  } catch(err) { toast('Error: ' + err.message, 3000); }
}

function openMyWorkSubmitModal(jobId) {
  const job = state.data.jobs.find(j => j.id === jobId);
  if (!job) return;
  const uid = state.user.uid;
  const allLocs = job.locations || [];
  const hasPerLoc = allLocs.some(l => l.assignedAssocId);
  const myLocs = hasPerLoc ? allLocs.filter(l => l.assignedAssocId === uid) : allLocs;
  const doneLocs = myLocs.filter(l => l.status === 'done');
  const existing = (job.associateSubmissions || []).find(s => s.assocId === uid);

  // Count how many other associates still need to submit
  const locsWithAssoc = allLocs.filter(l => l.assignedAssocId);
  const allAssocIds = [...new Set(locsWithAssoc.map(l => l.assignedAssocId))];
  const submittedIds = (job.associateSubmissions || []).map(s => s.assocId);
  const othersStillPending = allAssocIds.filter(id => id !== uid && !submittedIds.includes(id)).length;

  showModal(`
    <div class="modal-header"><h2>Submit My Work — ${job.customerId}</h2>
      <button onclick="this.closest('.modal-overlay').remove()" style="background:none;color:#fff;font-size:20px">✕</button>
    </div>

      <div style="background:#f0fff4;border:1px solid #9ae6b4;border-radius:7px;padding:10px;margin-bottom:14px;font-size:13px">
        <strong>✅ ${doneLocs.length} task${doneLocs.length===1?'':'s'} completed</strong>
        ${othersStillPending > 0 ? `<div style="color:var(--text-light);margin-top:3px;font-size:12px">${othersStillPending} other team member${othersStillPending===1?'':'s'} still working — job will go to manager once everyone submits.</div>` : ''}
      </div>
      <div class="form-group">
        <label>Hours Worked <span style="color:var(--danger)">*</span></label>
        <input type="number" id="my-work-hours" min="0" max="99" step="0.5" placeholder="e.g. 2.5"
          value="${existing ? existing.hours : ''}"
          style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:15px;font-weight:600"/>
        <div style="font-size:11px;color:var(--text-light);margin-top:3px">Total time you spent on your tasks.</div>
      </div>
      <div class="form-group">
        <label>Notes <span style="font-weight:400;color:var(--text-light)">(optional)</span></label>

          style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:13px;resize:vertical">${existing ? existing.notes : ''}</textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-teal" id="my-work-submit-btn" onclick="submitMyWork('${jobId}')">Submit My Work</button>
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
    </div>`);
  setTimeout(() => document.getElementById('my-work-hours')?.focus(), 50);

function filterAssignLocs() {
  const q = (document.getElementById('loc-search')?.value || '').toLowerCase().trim();
  document.querySelectorAll('.loc-assign-row').forEach(row => {
    row.style.display = (!q || (row.dataset.name || '').includes(q)) ? '' : 'none';
  });
  updateSelectAllState();
}

function toggleAssignSelectAll(checked) {
  document.querySelectorAll('.loc-assign-row').forEach(row => {
    if (row.style.display === 'none') return;
    const cb = row.querySelector('.loc-check');
    if (cb && !cb.disabled) cb.checked = checked;
  });
}

function updateSelectAllState() {
  const checks = [...document.querySelectorAll('.loc-assign-row')]
    .filter(r => r.style.display !== 'none')
    .map(r => r.querySelector('.loc-check'))
    .filter(c => c && !c.disabled);
  const sa = document.getElementById('loc-select-all');
  if (!sa) return;
  sa.checked = checks.length > 0 && checks.every(c => c.checked);
  sa.indeterminate = !sa.checked && checks.some(c => c.checked);
}

function bulkAssignApply() {
  const sel = document.getElementById('bulk-assign-user');
  const uid = sel?.value || '';
  const name = uid ? (sel.selectedOptions[0]?.text || '') : 'Unassigned';
  let count = 0;
  document.querySelectorAll('.loc-assign-row').forEach(row => {
    const cb = row.querySelector('.loc-check');
    if (!cb || !cb.checked || cb.disabled) return;
    const s = row.querySelector('.loc-assign-select');
    if (s) { s.value = uid; count++; }
  });
  if (!count) { toast('Select at least one location first'); return; }
  toast(`${count} location${count > 1 ? 's' : ''} assigned to ${name}`);
}

async function submitAssignLocations(jobId) {
  const job = state.data.jobs.find(j => j.id === jobId);
  if (!job) return;
  // Collect admin-defined capture column definitions
  const referenceDataTypes = {};
  document.querySelectorAll('.capture-col-row').forEach(row => {
    const name = row.querySelector('.capture-col-name')?.value?.trim();
    const type = row.querySelector('.capture-col-type')?.value || 'text';
    if (name) referenceDataTypes[name] = type;
  });
  const selects = [...document.querySelectorAll('.loc-assign-select')];
  const locations = (job.locations||[]).map(l => {
    const sel = selects.find(s => s.dataset.locId === l.id);
    const assignedAssocId = sel ? (sel.value || null) : l.assignedAssocId;
    return { ...l, assignedAssocId };
  });
  try {
    await apiFetch(`/api/jobs/${jobId}/locations`, { method: 'PUT', body: JSON.stringify({ locations, referenceDataTypes }) });
    document.querySelector('.modal-overlay')?.remove();
    await loadData();
    renderView();
    toast('Locations assigned');
  } catch(err) { toast('Error: ' + err.message, 3000); }
}

// ── Photo helpers ──
const _pendingPhotos = {};

async function compressImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    const blobUrl = URL.createObjectURL(file);
    img.onload = () => {
      const MAX = 1200; // smaller max for scanner cameras
      const scale = Math.min(1, MAX / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(blobUrl);
      resolve(canvas.toDataURL('image/jpeg', 0.72)); // slightly more compression
    };
    img.onerror = () => { URL.revokeObjectURL(blobUrl); resolve(null); };
    img.src = blobUrl;
  });
}

async function handleLocationPhotoSelect(input, jobId, locId) {
  const files = [...input.files];
  if (!files.length) return;
  const key = `${jobId}_${locId}`;
  if (!_pendingPhotos[key]) _pendingPhotos[key] = [];
  const preview = document.getElementById('loc-photos-preview');
  for (const file of files) {
    const ph = document.createElement('div');
    ph.style.cssText = 'width:64px;height:64px;border-radius:6px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0';
    ph.textContent = '⏳';
    preview?.appendChild(ph);
    try {
      const imageData = await compressImage(file);
      if (!imageData) throw new Error('Could not read image');
      const result = await apiFetch(`/api/jobs/${jobId}/locations/${locId}/photos`, {
        method: 'POST', body: JSON.stringify({ imageData }),
      });
      _pendingPhotos[key].push(result.url);
      ph.innerHTML = `<img src="${result.url}" style="width:64px;height:64px;object-fit:cover;border-radius:6px;cursor:pointer" onclick="window.open('${result.url}','_blank')"/>`;
    } catch(err) { ph.textContent = '❌'; toast('Photo failed: ' + err.message, 3000); }
  }
  input.value = '';
}

// Returns true if label looks like a date field
function isDateLabel(label) {
  return /date|expir|exp\b|mfg|manufactur|best.?before|bb|born|dob/i.test(label);
}

// When label changes, swap value input type if it looks like a date field
function onTaskRefLabelChange(labelEl) {
  const row = labelEl.closest('.field-row');
  const valueEl = row?.querySelector('[data-ref-value]');
  if (!valueEl) return;
  if (isDateLabel(labelEl.value)) {
    valueEl.type = 'date';
    valueEl.removeAttribute('data-scan-target');
    valueEl.placeholder = 'YYYYMMDD';
  } else {
    valueEl.type = 'text';
    valueEl.setAttribute('data-scan-target', '1');
    valueEl.placeholder = 'Value';
  }
}

async function submitAddTask(jobId) {
  const job = state.data.jobs.find(j => j.id === jobId);
  if (!job) return;
  const name = document.getElementById('new-task-name')?.value.trim();
  if (!name) { toast('Task name is required'); return; }

  const instructions = document.getElementById('new-task-instructions')?.value.trim() || '';
  const referenceData = {};
  document.querySelectorAll('#new-task-refs .field-row').forEach(row => {
    const [labelEl, valueEl] = row.querySelectorAll('input');
    const label = labelEl?.value.trim();
    let value = valueEl?.value.trim();
    if (!label || !value) return;
    // Convert date picker value (YYYY-MM-DD) to YYYYMMDD
    if (valueEl.type === 'date' && value) value = value.replace(/-/g, '');
    referenceData[label] = value;
  });

  const newLoc = {
    id: `loc_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
    name,
    instructions,
    referenceData,
    assignedAssocId: state.user.uid,
    assignedAssocName: state.user.displayName || state.user.email,
    status: 'pending',
    capturedData: {},
    assocNotes: '',
    photos: [],
  };

  const existingLocs = job.locations || [];
  try {
    await apiFetch(`/api/jobs/${jobId}/locations`, {
      method: 'PUT',
      body: JSON.stringify({ locations: [...existingLocs, newLoc] }),
    });
    document.querySelector('.modal-overlay')?.remove();
    await loadData();
    renderView();
    toast('Task added');
  } catch(err) {
    toast('Error: ' + err.message, 3000);
  }
}

async function submitMarkLocationDone(jobId, locId) {
  const job = state.data.jobs.find(j => j.id === jobId);
  const captureFields = (job?.csvCaptureFields && job.csvCaptureFields.length) ? job.csvCaptureFields : getJobFields(job?.jobTypeId);
  const captureForm = document.getElementById('loc-capture-form');
  const capturedData = captureForm ? collectFields(captureForm, captureFields) : {};
  // Collect admin-defined capture column values and merge into capturedData
  document.querySelectorAll('[data-capture-key]').forEach(inp => {
    const key = inp.dataset.captureKey;
    let val = inp.value.trim();
    if (inp.dataset.captureType === 'date' && val) val = val.replace(/-/g, '');
    capturedData[key] = val;
  });
  const assocNotes = document.getElementById('loc-done-notes')?.value || '';
  const btn = document.getElementById('loc-done-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    const result = await apiFetch(`/api/jobs/${jobId}/locations/${locId}/done`, {
      method: 'PUT', body: JSON.stringify({ assocNotes, capturedData }),
    });
    delete _pendingPhotos[`${jobId}_${locId}`];
    document.querySelector('.modal-overlay')?.remove();
    await loadData();
    renderView();
    if (result.allDone) toast('All locations done — job submitted for manager review');
    else toast('Location marked done');

    // Offer Logiwa movement if integration is configured and enabled for this job
    try {
      const lgwStatus = await apiFetch('/api/logiwa/active').catch(()=>null);
      if (lgwStatus?.ok) {
        const job = state.data.jobs.find(j => j.id === jobId);
        const jobType = state.data.jobTypes.find(t => t.id === job?.jobTypeId);
        const logiwaEnabled = job?.logiwaEnabled != null ? job.logiwaEnabled : (jobType?.logiwa?.enabled || false);
        if (!logiwaEnabled) { /* Logiwa not enabled for this job — skip */ }
        else {
          const loc = (job?.locations || []).find(l => l.id === locId);
          // Find SKU from referenceData (case-insensitive: 'SKU', 'Kit SKU', etc.)
          const refData = loc?.referenceData || {};
          const skuEntry = Object.entries(refData).find(([k]) => /^(kit.?sku|sku)$/i.test(k));
          const sku = (skuEntry?.[1] || '').trim();
          // Associates always default to transfer; other roles use job type default
          const isAssociate = state.user?.role === 'associate';
          const defaultMovementType = isAssociate ? 'transfer' : (jobType?.logiwa?.movementType || 'add');
          // Auto-open modal directly — no toast, no extra click

// ── Analytics filter ──
function applyAnalyticsFilter() {
  const customer = document.getElementById('af-customer')?.value || '';
  const type     = document.getElementById('af-type')?.value || '';
  const from     = document.getElementById('af-from')?.value || '';
  const to       = document.getElementById('af-to')?.value || '';

  let base = state.data.jobs.filter(j => j.status === 'completed');
  if (customer) base = base.filter(j => j.customerId === j.customerId && j.customerId === customer);
  if (type)     base = base.filter(j => j.jobTypeId === type);

  const now = new Date();
  let fromDate = from ? new Date(from) : null;
  let toDate   = to   ? new Date(to + 'T23:59:59') : null;
  let periodLabel = 'Last 30 days vs prior 30 days';

  let currJobs, priorJobs;

  if (fromDate && toDate) {
    const duration = toDate - fromDate;
    currJobs  = base.filter(j => { const d=getJobDate(j); return d && d>=fromDate && d<=toDate; });
    priorJobs = base.filter(j => { const d=getJobDate(j); return d && d>=new Date(fromDate-duration) && d<fromDate; });
    periodLabel = `${from} → ${to} vs prior ${Math.round(duration/86400000)} days`;
  } else if (fromDate) {
    const duration = now - fromDate;
    currJobs  = base.filter(j => { const d=getJobDate(j); return d && d>=fromDate; });
    priorJobs = base.filter(j => { const d=getJobDate(j); return d && d>=new Date(fromDate-duration) && d<fromDate; });
    periodLabel = `Since ${from} vs prior period`;
  } else if (toDate) {
    // No from: default to last 30 days ending at toDate
    const start30 = new Date(toDate - 30*86400000);
    const start60 = new Date(toDate - 60*86400000);
    currJobs  = base.filter(j => { const d=getJobDate(j); return d && d>=start30 && d<=toDate; });
    priorJobs = base.filter(j => { const d=getJobDate(j); return d && d>=start60 && d<start30; });
    periodLabel = `30 days to ${to} vs prior 30 days`;
  } else {
    const d30 = new Date(now.getTime()-30*86400000);
    const d60 = new Date(now.getTime()-60*86400000);
    currJobs  = base.filter(j => { const d=getJobDate(j); return d && d>=d30; });
    priorJobs = base.filter(j => { const d=getJobDate(j); return d && d>=d60 && d<d30; });
  }

  // Update KPI cards
  const kpiEl = document.getElementById('analytics-kpis');
  if (kpiEl) kpiEl.innerHTML = renderAnalyticsKPICards(analyticsKPIs(currJobs), analyticsKPIs(priorJobs));
  const lblEl = document.getElementById('analytics-period-label');
  if (lblEl) lblEl.textContent = 'Showing: ' + periodLabel;

  // Update jobs table (show all base-filtered jobs, not just date window)
  const allFiltered = from||to
    ? base.filter(j => {
        const d = getJobDate(j);
        return d && (!fromDate||d>=fromDate) && (!toDate||d<=toDate);
      })
    : base;
  const tbody = document.querySelector('#analytics-jobs-table tbody');
  if (tbody) tbody.innerHTML = renderAnalyticsJobRows(allFiltered);
}

// ── Jobs filter + pagination ──
function applyJobsFilter() {
  const status     = document.getElementById('jf-status')?.value;
  const customer   = document.getElementById('jf-customer')?.value;
  const type       = document.getElementById('jf-type')?.value;
  const createdBy  = document.getElementById('jf-created-by')?.value;
  const assignedTo = document.getElementById('jf-assigned-to')?.value;
  const dateFrom   = document.getElementById('jf-date-from')?.value;  // YYYY-MM-DD
  const dateTo     = document.getElementById('jf-date-to')?.value;
  const uid = state.user?.uid;

  let jobs = state.data.jobs;
  if (status)   jobs = jobs.filter(j => j.status === status);
  if (customer) jobs = jobs.filter(j => j.customerId === customer);
  if (type)     jobs = jobs.filter(j => j.jobTypeId === type);
  if (createdBy) {
    const targetUid = createdBy === '__me__' ? uid : createdBy;
    jobs = jobs.filter(j => j.createdBy === targetUid);
  }
  if (assignedTo) {
    const targetUid = assignedTo === '__me__' ? uid : assignedTo;
    jobs = jobs.filter(j =>
      j.assignedManagerId === targetUid ||
      (j.assignedAssocId || []).includes(targetUid)
    );
  }
  if (dateFrom || dateTo) {
    jobs = jobs.filter(j => {
      const d = fmtDate(j.createdAt); // YYYY-MM-DD via en-CA locale
      if (d === '—') return false;
      if (dateFrom && d < dateFrom) return false;
      if (dateTo   && d > dateTo)   return false;
      return true;
    });
  }

  state.jobsPage = 0;
  window._filteredJobs = jobs;
  _renderJobsPage();
}

function navToJobsFilter(which) {
  state.view = 'jobs';
  sessionStorage.setItem('wh_last_view', 'jobs');

  const jobs = state.data.jobs;

    ? jobs.filter(isOverdue)
    : jobs.filter(isDueToday);
  state.jobsPage = 0;
  _renderJobsPage();
}

function resetJobsFilter() {
  ['jf-status','jf-customer','jf-type','jf-created-by','jf-assigned-to','jf-date-from','jf-date-to'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  state.jobsPage = 0;
  window._filteredJobs = null;
  _renderJobsPage();
}

function jobsPagePrev() {
  if (state.jobsPage > 0) { state.jobsPage--; _renderJobsPage(); }
}

function jobsPageNext() {
  const jobs = window._filteredJobs || state.data.jobs;
  const totalPages = Math.ceil(jobs.length / JOBS_PER_PAGE);
  if (state.jobsPage < totalPages - 1) { state.jobsPage++; _renderJobsPage(); }
}

function _renderJobsPage() {
  const jobs = window._filteredJobs || state.data.jobs;
  const page = state.jobsPage;
  const pageJobs = jobs.slice(page * JOBS_PER_PAGE, (page + 1) * JOBS_PER_PAGE);
  const tbody = document.querySelector('#all-jobs-table tbody');
  if (tbody) tbody.innerHTML = renderJobRows(pageJobs);
  const pag = document.getElementById('jobs-pagination');
  if (pag) pag.innerHTML = renderPagination(jobs.length, page, JOBS_PER_PAGE, 'jobsPagePrev()', 'jobsPageNext()');
  // Scroll table back to top
  document.querySelector('#all-jobs-table')?.closest('.tbl-wrap')?.scrollTo(0, 0);
}

function renderRateTable() {

  const rateCards = state.data.rateCards;

  const jobTypes = state.data.jobTypes.map(jt => ({
    id: jt.id,
    name: jt.name,
    fields: (jt.fields || []).filter(f => f.type === 'number'),
  })).filter(jt => jt.fields.length > 0);

  if (!jobTypes.length) { wrap.innerHTML = '<p style="color:var(--text-light);font-size:13px;margin-top:12px">No job types with numeric fields found. Add job types first.</p>'; return; }

          <input type="number" min="0" step="0.01"
            id="rate-${customer}-${jt.id}-${f.id}"
            value="${(rateCards[customer]||{})[jt.id]?.[f.id]||0}"
            style="width:100px;padding:6px;border:1px solid var(--border);border-radius:5px"/>
          <span style="font-size:12px;color:var(--text-light)">per ${f.label.toLowerCase()}</span>

}

async function saveRates() {
  const customer = document.getElementById('rate-customer')?.value;
  if (!customer) { toast('Select a customer first'); return; }

  const jobTypes = state.data.jobTypes.map(jt => ({
    id: jt.id,
    fields: (jt.fields || []).filter(f => f.type === 'number'),
  })).filter(jt => jt.fields.length > 0);

  const newRates = JSON.parse(JSON.stringify(state.data.rateCards));
  if (!newRates[customer]) newRates[customer] = {};

  jobTypes.forEach(jt => {
    if (!newRates[customer][jt.id]) newRates[customer][jt.id] = {};
    jt.fields.forEach(f => {
      const el = document.getElementById(`rate-${customer}-${jt.id}-${f.id}`);
      if (el) newRates[customer][jt.id][f.id] = parseFloat(el.value) || 0;
    });
  });

  try {
    await apiFetch('/api/rates', { method: 'PUT', body: JSON.stringify(newRates) });
    state.data.rateCards = newRates;
    toast('Rates saved');
  } catch (err) {
    toast('Error: ' + err.message, 3000);
  }
}

// ── Locations Excel export ──
async function exportJobLocations(jobId) {
  try {
    const token = await getToken();
    const resp = await fetch(`/api/jobs/${jobId}/export/locations`, {
      headers: { Authorization: `Bearer ${token}` },
    });
    if (!resp.ok) { const b = await resp.json().catch(()=>{}); throw new Error(b?.error || 'Export failed'); }
    const blob = await resp.blob();
    const job = state.data.jobs.find(j => j.id === jobId);
    const name = `${job?.customerId||'job'}-locations.xlsx`.replace(/[^a-z0-9._-]/gi,'_');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    URL.revokeObjectURL(a.href);
  } catch(err) { toast('Export error: ' + err.message, 3000); }
}

// ── CSV export ──
async function exportCSV() {
  try {
    const token = await getToken();
    const a = document.createElement('a');
    a.href = `/api/export/csv?_t=${token}`;
    // Use fetch with auth header instead
    const resp = await fetch('/api/export/csv', { headers: { Authorization: `Bearer ${token}` } });
    if (!resp.ok) throw new Error('Export failed');
    const blob = await resp.blob();
    a.href = URL.createObjectURL(blob);
    a.download = `warehouse-jobs-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (err) {
    toast('Export error: ' + err.message, 3000);
  }
}

// ── Jobs Excel export (client-side, respects active filters) ──
function exportJobsExcel(btn) {
  try {
    if (typeof XLSX === 'undefined') { toast('Excel library not loaded yet, try again in a moment', 3000); return; }
    if (btn) { btn.disabled = true; btn.textContent = 'Exporting…'; }

    const jobs = window._filteredJobs || state.data.jobs;
    if (!jobs.length) { toast('No jobs to export'); if (btn) { btn.disabled = false; btn.textContent = '⬇ Export Excel'; } return; }

    // Build a helper to convert Firestore timestamp → readable string
    const tsStr = ts => {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts._seconds ? ts._seconds * 1000 : ts);
      return d.toLocaleDateString('en-CA'); // YYYY-MM-DD
    };

    const jobTypeName = id => (state.data.jobTypes||[]).find(t => t.id === id)?.name || id || '';

    // Collect all unique field definitions across all job types present in this export
    const allJobTypeDefs = state.data.jobTypes || [];
    const fieldMap = {}; // fieldId → label
    jobs.forEach(j => {
      const jtDef = allJobTypeDefs.find(t => t.id === j.jobTypeId);
      (jtDef?.fields || []).forEach(f => { if (!fieldMap[f.id]) fieldMap[f.id] = f.label; });
    });
    const fieldIds = Object.keys(fieldMap);

    const rows = jobs.map(j => {
      const row = {
        'Job #':          j.jobNumber || '',
        'Customer':       j.customerId || '',
        'Job Type':       jobTypeName(j.jobTypeId),
        'Status':         (j.status || '').replace(/_/g, ' '),
        'Billable':       j.billable ? 'Yes' : 'No',
        'Created Date':   tsStr(j.createdAt),
        'Due Date':       j.dueDate || '',
        'Created By':     j.createdByName || '',
        'Manager':        j.assignedManagerName || '',
        'Associates':     (j.assignedAssocNames || []).join(', '),
        'Tasks Total':    (j.locations || []).length,
        'Tasks Done':     (j.locations || []).filter(l => l.status === 'done').length,
        'Notes':          j.instructions || '',
      };
      // Job type fields (Order Number, Cartons, Units, etc.)
      fieldIds.forEach(fid => {
        const label = fieldMap[fid];
        const val = j.fields?.[fid];
        row[label] = val != null && val !== '' ? val : '';
      });
      // Financial columns (admin only — stripped below if not admin)
      row['Revenue ($)']  = j.revenue  != null ? Number(j.revenue).toFixed(2)  : '';
      row['Cost ($)']     = j.cost     != null ? Number(j.cost).toFixed(2)     : '';
      row['Profit ($)']   = j.profit   != null ? Number(j.profit).toFixed(2)   : '';
      row['Margin (%)']   = j.marginPct != null ? Number(j.marginPct).toFixed(1) : '';
      row['Rating']       = j.rating || '';
      row['Completed Date'] = tsStr(j.completedAt);
      row['Cancelled Date'] = tsStr(j.cancelledAt);
      return row;
    });

    if (state.user.role !== 'admin') {
      rows.forEach(row => {
        delete row['Revenue ($)']; delete row['Cost ($)']; delete row['Profit ($)'];
        delete row['Margin (%)']; delete row['Rating']; delete row['Billable'];
      });
    }

    const ws = XLSX.utils.json_to_sheet(rows);

    // Auto-fit column widths
    const colWidths = Object.keys(rows[0]).map(k => ({
      wch: Math.max(k.length, ...rows.map(r => String(r[k] ?? '').length)) + 2
    }));
    ws['!cols'] = colWidths;

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Jobs');

    const dateStr = new Date().toISOString().split('T')[0];
    XLSX.writeFile(wb, `warehouse-jobs-${dateStr}.xlsx`);
    toast(`Exported ${jobs.length} job${jobs.length === 1 ? '' : 's'}`, 2500);
  } catch (err) {
    toast('Export error: ' + err.message, 3000);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '⬇ Export Excel'; }
  }
}

async function searchLogiwaAttrInventory(jobId) {
  const sku = document.getElementById('lgw-attr-sku')?.value?.trim();
  const statusEl = document.getElementById('lgw-attr-search-status');
  const sel = document.getElementById('lgw-attr-inv-sel');
  const btn = document.getElementById('lgw-attr-search-btn');
  if (!sku) { if(statusEl) statusEl.textContent = 'Enter a SKU'; return; }
  if(btn) { btn.disabled=true; btn.textContent='Searching…'; }
  if(statusEl) statusEl.textContent='Searching Logiwa…';
  try {
    const job = (state.data.jobs||[]).find(j=>j.id===jobId);
    const clientId = job?.customer ? (state._logiwaClientMappings||{})[job.customer]||'' : '';
    const params = new URLSearchParams({ sku });
    if(clientId) params.set('clientId', clientId);
    const r = await apiFetch(`/api/logiwa/search?${params}`);
    const items = r.items||[];
    if(!items.length) { if(statusEl) statusEl.textContent=`No records found for "${sku}"`; return; }
    if(statusEl) statusEl.textContent=`Found ${items.length} record(s) — select which to update`;
    if(sel) sel.innerHTML = items.map(i=>`<option value="${i.inventoryId}" data-client="${i.clientId}">${i.sku} | ${i.location||'No location'} | Lot: ${i.lotBatch||'—'} | Exp: ${i.expiry||'—'}</option>`).join('');
    document.getElementById('lgw-attr-results').style.display='';
  } catch(err) { if(statusEl) statusEl.textContent='Error: '+err.message; }
  finally { if(btn) { btn.disabled=false; btn.textContent='Search'; } }
}

async function submitLogiwaAttributes(jobId) {
  const sel = document.getElementById('lgw-attr-inv-sel');
  const inventoryIds = sel ? [...sel.selectedOptions].map(o=>o.value) : [];
  const clientId = sel?.selectedOptions[0]?.dataset?.client || '';
  const lot = document.getElementById('lgw-attr-lot')?.value?.trim()||null;
  const expiry = document.getElementById('lgw-attr-expiry')?.value||null;
  const prodDate = document.getElementById('lgw-attr-prod-date')?.value||null;
  const errEl = document.getElementById('lgw-attr-error');
  if(!inventoryIds.length) { if(errEl){errEl.textContent='Select at least one inventory record';errEl.style.display='';} return; }
  if(!lot && !expiry && !prodDate) { if(errEl){errEl.textContent='Enter at least one attribute to update';errEl.style.display='';} return; }
  const btn = document.querySelector('.modal-footer .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Updating…';}
  try {
    await apiFetch('/api/logiwa/change-attributes', { method: 'PUT', body: JSON.stringify({
      inventoryIds, clientId,
      lotBatchNumber: lot,
      expiryDate: expiry ? new Date(expiry).toISOString() : null,
      productionDate: prodDate ? new Date(prodDate).toISOString() : null,
    })});
    document.querySelector('.modal-overlay')?.remove();
    toast('✓ Inventory attributes updated in Logiwa');
  } catch(err) {
    if(errEl){errEl.textContent='Error: '+err.message;errEl.style.display='';}
    if(btn){btn.disabled=false;btn.textContent='Update Attributes';}
  }
}

<!-- ══════════════════════════════════════════════════════════════════
     BARCODE SCANNER ENGINE
     Zebra / Honeywell scanners act as keyboard wedge:
       • Characters arrive < 30ms apart (vs 100ms+ for human typing)
       • Sequence ends with Enter (keyCode 13)
     We detect this pattern globally and route the scanned value.
══════════════════════════════════════════════════════════════════ -->
<script>
(function() {
  // ── State ──────────────────────────────────────────────────────
  let _buf = '';
  let _lastKey = 0;
  const THRESHOLD_MS = 40;   // chars faster than this = scanner
  const MIN_LEN      = 2;    // ignore single-char "scans"

  // ── Main keydown listener ───────────────────────────────────────
  document.addEventListener('keydown', function(e) {
    const now = Date.now();
    const tag = document.activeElement?.tagName;
    const inInput = (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT');

    if (e.key === 'Enter') {
      const gap = now - _lastKey;
      const code = _buf.trim();
      _buf = '';
      _lastKey = 0;

      // Only treat as barcode if the buffer arrived fast enough
      if (code.length >= MIN_LEN && gap < THRESHOLD_MS * 3) {
        e.preventDefault();
        handleBarcodeScan(code, inInput);
      }
      return;
    }

    // Printable character
    if (e.key.length === 1) {
      const gap = now - _lastKey;
      if (_lastKey && gap > THRESHOLD_MS * 4) {
        // Too slow — this is human typing, reset buffer
        _buf = '';
      }
      _buf += e.key;
      _lastKey = now;
    } else {
      // Non-printable (arrow, shift, etc.) breaks scanner sequence
      if (e.key !== 'Shift' && e.key !== 'CapsLock') {
        _buf = '';
        _lastKey = 0;
      }
    }
  }, true); // capture phase so we see it before inputs

  // ── Scan Router ─────────────────────────────────────────────────
  function handleBarcodeScan(code, inInput) {
    // 1. If a scan-target input is focused, fill it and move on
    const focused = document.activeElement;
    if (focused && focused.dataset.scanTarget) {
      focused.value = code;
      focused.dispatchEvent(new Event('input', { bubbles: true }));
      // Move focus to next field
      const form = focused.closest('form');
      if (form) {
        const inputs = [...form.querySelectorAll('input,textarea,select')].filter(el => !el.disabled && el.tabIndex !== -1);
        const idx = inputs.indexOf(focused);
        if (idx >= 0 && idx < inputs.length - 1) inputs[idx + 1].focus();
      }
      showScanToast(code, 'Filled: ' + (focused.placeholder || focused.name || 'field'));
      return;
    }

    // 2. If any text/number input is focused, fill it
    if (inInput && focused && (focused.type === 'text' || focused.type === 'number' || focused.tagName === 'TEXTAREA')) {
      focused.value = code;
      focused.dispatchEvent(new Event('input', { bubbles: true }));
      showScanToast(code, 'Filled');
      return;
    }

    // 3. Try to find a task/location matching this barcode
    if (routeScanToTask(code)) return;

    // 4. Try to find and open a job by job number
    if (routeScanToJob(code)) return;

    // 5. Nothing matched — show the scan and let user see it
    showScanToast(code, 'Scanned — no match found');
  }

  // Normalize for fuzzy barcode matching:
  // "bin24-a-10" and "BIN24A10" both become "BIN24A10"
  function norm(s) { return String(s || '').toUpperCase().replace(/[-_\s]/g, ''); }

  // ── Route to task by location name or reference data ────────────
  function routeScanToTask(code) {
    if (!window.state?.data?.jobs) return false;
    const normalized = norm(code);

    // Search all assigned jobs for a location whose name or referenceData value matches
    for (const job of state.data.jobs) {
      if (job.status === 'completed' || job.status === 'cancelled') continue;
      const myUid = state.user?.uid;
      const isAssigned = (job.assignedAssocId || []).includes(myUid) ||
                         job.assignedManagerId === myUid ||
                         ['admin', 'manager'].includes(state.user?.role);
      if (!isAssigned) continue;

      for (const loc of (job.locations || [])) {
        if (loc.status === 'done') continue;
        const nameMatch = norm(loc.name) === normalized;
        const refMatch = Object.values(loc.referenceData || {}).some(v => norm(v) === normalized);
        if (nameMatch || refMatch) {
          showScanToast(code, `Found: ${loc.name} → opening task`);
          setTimeout(() => openMarkLocationDoneModal(job.id, loc.id), 400);
          return true;
        }
      }
    }
    return false;
  }

  // ── Route to job by job number (ES-001) ─────────────────────────
  function routeScanToJob(code) {
    if (!window.state?.data?.jobs) return false;
    const normalized = code.trim().toUpperCase();
    const job = state.data.jobs.find(j => (j.jobNumber || '').toUpperCase() === normalized);
    if (job) {
      showScanToast(code, `Opening job ${job.jobNumber}`);
      setTimeout(() => openJobModal(job.id), 400);
      return true;
    }
    return false;
  }

  // ── Toast ────────────────────────────────────────────────────────
  function showScanToast(code, action) {
    let el = document.getElementById('scan-toast');
    if (!el) {
      el = document.createElement('div');
      el.id = 'scan-toast';
      el.style.cssText = [
        'position:fixed', 'bottom:80px', 'left:50%', 'transform:translateX(-50%)',
        'background:#1a202c', 'color:#fff', 'padding:10px 18px', 'border-radius:20px',
        'font-size:13px', 'z-index:9999', 'display:flex', 'align-items:center', 'gap:10px',
        'box-shadow:0 4px 16px rgba(0,0,0,0.3)', 'max-width:90vw',
      ].join(';');
      document.body.appendChild(el);
    }
    el.innerHTML = `<span style="font-size:18px">📷</span><div><div style="font-weight:700;font-size:14px">${code}</div><div style="font-size:12px;opacity:0.75">${action}</div></div>`;
    el.style.opacity = '1';
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.style.opacity = '0'; }, 2500);
  }

  // ── Expose for manual trigger (e.g. test button) ─────────────────
  window._triggerBarcodeScan = handleBarcodeScan;
})();
</script>
