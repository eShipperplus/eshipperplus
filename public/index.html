<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="WH Billing"/>
<meta name="theme-color" content="#34368a"/>
<link rel="manifest" href="/manifest.json"/>
<title>eShipper+ Warehouse Billing</title>
<style>
:root {
  --primary: #34368a;
  --teal: #62c0ae;
  --grey: #e6e7e8;
  --dark: #1e2050;
  --white: #ffffff;
  --danger: #e53e3e;
  --success: #38a169;
  --warning: #d69e2e;
  --text: #2d3748;
  --text-light: #718096;
  --border: #cbd5e0;
  --radius: 10px;
  --shadow: 0 2px 8px rgba(0,0,0,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f8fc; color: var(--text); min-height: 100vh; }
a { color: var(--primary); text-decoration: none; }
button { cursor: pointer; border: none; font-family: inherit; }

/* ── Layout ── */
#app { display: flex; flex-direction: column; min-height: 100vh; }
#topbar { background: var(--primary); color: #fff; display: flex; align-items: center; padding: 0 16px; height: 56px; gap: 12px; position: sticky; top: 0; z-index: 100; }
#topbar .logo { font-weight: 800; font-size: 18px; letter-spacing: 0.5px; flex: 1; }
#topbar .logo span { color: var(--teal); }
#topbar .user-info { font-size: 13px; opacity: 0.85; }
#topbar .menu-btn { background: none; color: #fff; font-size: 22px; padding: 4px; display: none; }
#offline-banner { background: var(--warning); color: #fff; text-align: center; padding: 6px; font-size: 13px; font-weight: 600; display: none; }
#offline-banner.show { display: block; }
#main { flex: 1; display: flex; }
#sidebar { width: 220px; background: var(--dark); min-height: calc(100vh - 56px); padding: 12px 0; flex-shrink: 0; }
#sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 11px 20px; color: rgba(255,255,255,0.75); font-size: 14px; transition: background 0.15s; }
#sidebar nav a:hover, #sidebar nav a.active { background: rgba(255,255,255,0.10); color: #fff; }
#sidebar nav a .icon { font-size: 18px; width: 22px; text-align: center; }
#content { flex: 1; padding: 20px; overflow-y: auto; }

/* ── Cards / Panels ── */
.card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 14px; }
.kpi-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
.kpi { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; text-align: center; }
.kpi .val { font-size: 26px; font-weight: 800; color: var(--primary); }
.kpi .lbl { font-size: 12px; color: var(--text-light); margin-top: 4px; }

/* ── Table ── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--primary); color: #fff; padding: 10px 12px; text-align: left; font-weight: 600; white-space: nowrap; }
td { padding: 9px 12px; border-bottom: 1px solid var(--grey); vertical-align: middle; }
tr:hover td { background: #f0f4ff; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge-created { background:#e9d8fd; color:#553c9a; }
.badge-assigned_manager { background:#bee3f8; color:#2b6cb0; }
.badge-assigned_associate { background:#feebc8; color:#c05621; }
.badge-pending_review { background:#fed7e2; color:#97266d; }
.badge-pending_tech_review { background:#fbd38d; color:#c05621; }
.badge-in_progress { background:#fefcbf; color:#744210; }
.badge-completed { background:#c6f6d5; color:#276749; }
.badge-great { background:#c6f6d5; color:#276749; }
.badge-good { background:#bee3f8; color:#2b6cb0; }
.badge-needs_improvement { background:#fed7d7; color:#c53030; }
.badge-overdue    { background:#fed7d7; color:#c53030; }
.badge-due-today  { background:#fefcbf; color:#744210; }
.badge-cancelled  { background:#e2e8f0; color:#4a5568; }

/* ── Forms ── */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px;
  font-size: 14px; font-family: inherit; background: #fff; color: var(--text);
  transition: border-color 0.15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(52,54,138,0.12);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.toggle-row { display: flex; align-items: center; gap: 10px; }
.toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #ccc; border-radius: 24px; cursor: pointer; transition: 0.2s; }
.toggle-slider:before { position: absolute; content: ''; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s; }
.toggle input:checked + .toggle-slider { background: var(--teal); }
.toggle input:checked + .toggle-slider:before { transform: translateX(20px); }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 7px; font-size: 14px; font-weight: 600; transition: opacity 0.15s, box-shadow 0.15s; }
.btn:hover { opacity: 0.88; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-teal { background: var(--teal); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-ghost { background: transparent; color: var(--primary); border: 1.5px solid var(--primary); }
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 5px; }
.btn-icon { padding: 6px 8px; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: #fff; border-radius: var(--radius); width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.22); }
.modal-header { background: var(--primary); color: #fff; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-radius: var(--radius) var(--radius) 0 0; }
.modal-header h2 { font-size: 16px; }
.modal-body { padding: 20px; }
.modal-footer { padding: 12px 20px; border-top: 1px solid var(--grey); display: flex; gap: 10px; justify-content: flex-end; }

/* ── Sign-in ── */
#signin-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary) 0%, var(--dark) 100%); }
.signin-card { background: #fff; border-radius: 16px; padding: 40px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,0.25); }
.signin-logo { font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
.signin-logo span { color: var(--teal); }
.signin-sub { color: var(--text-light); font-size: 14px; margin-bottom: 28px; }
.google-btn { display: inline-flex; align-items: center; gap: 10px; background: #fff; border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 24px; font-size: 15px; font-weight: 600; color: var(--text); cursor: pointer; width: 100%; justify-content: center; transition: box-shadow 0.2s; }
.google-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }

/* ── Rating result ── */
.rating-great { background: #c6f6d5; color: #276749; border-radius: var(--radius); padding: 20px; text-align: center; }
.rating-good { background: #bee3f8; color: #2b6cb0; border-radius: var(--radius); padding: 20px; text-align: center; }
.rating-needs_improvement { background: #fed7d7; color: #c53030; border-radius: var(--radius); padding: 20px; text-align: center; }
.rating-result h3 { font-size: 22px; font-weight: 800; }
.rating-result p { font-size: 14px; margin-top: 6px; }

/* ── Mobile nav tabs ── */
#mobile-nav { display: none; background: var(--primary); position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; }
#mobile-nav a { display: inline-flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 0; color: rgba(255,255,255,0.7); font-size: 10px; flex: 1; transition: color 0.15s; text-align: center; }
#mobile-nav a .icon { font-size: 20px; }
#mobile-nav a.active { color: var(--teal); }

/* ── Misc ── */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-header h1 { font-size: 20px; font-weight: 700; color: var(--primary); }
.empty-state { text-align: center; padding: 40px; color: var(--text-light); }
.spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 22px; border-radius: 20px; font-size: 14px; z-index: 1000; animation: fadeInUp 0.3s; }
@keyframes fadeInUp { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
.filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 16px; }
.filter-row .form-group { margin-bottom: 0; min-width: 150px; }

/* ── Pagination ── */
.pagination { display:flex; align-items:center; gap:8px; margin-top:14px; justify-content:flex-end; flex-wrap:wrap; }
.pagination .page-info { font-size:13px; color:var(--text-light); margin-right:4px; }

/* ── Info / note boxes ── */
.info-box { padding:8px 12px; border-radius:7px; font-size:13px; line-height:1.5; }
.info-box-green  { background:#f0fff4; border:1px solid #9ae6b4; color:#276749; }
.info-box-blue   { background:#ebf8ff; border:1px solid #bee3f8; }
.info-box-purple { background:#faf5ff; border:1px solid #e9d8fd; }
.info-box-grey   { background:#f7f8fc; }

/* ── Activity log table — reuse global table styles ── */
.al-table { width:100%; border-collapse:collapse; font-size:13px; }
.al-table th { background:var(--primary); color:#fff; padding:10px 14px; text-align:left; font-weight:600; white-space:nowrap; }
.al-table td { padding:9px 14px; border-bottom:1px solid var(--grey); vertical-align:middle; }
.al-table tr:hover td { background:#f0f4ff; }
.profit-bar-wrap { background: var(--grey); border-radius: 4px; height: 8px; overflow: hidden; }
.profit-bar { height: 100%; border-radius: 4px; }
.field-row { display:flex; gap:6px; align-items:center; margin-bottom:8px; padding:8px; background:#f7f8fc; border-radius:6px; flex-wrap:wrap; }
.kpi-trend { color: var(--teal); font-size: 11px; margin-top: 4px; }
.sidebar-section { padding: 8px 20px 4px; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.35); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 8px; }
.user-avatar { width:32px; height:32px; border-radius:50%; background:var(--teal); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0; }

/* ── Responsive ── */
@media (max-width: 768px) {
  #sidebar { display: none; }
  #mobile-nav { display: flex; }
  #content { padding: 12px 12px 70px; }
  .form-row { grid-template-columns: 1fr; }
  .kpi-row { grid-template-columns: 1fr 1fr; }
  #topbar .menu-btn { display: block; }
  .modal { max-width: 100%; }
  table { font-size: 12px; }
  th, td { padding: 7px 8px; }
}
@media (max-width: 480px) {
  .kpi-row { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, browserLocalPersistence, setPersistence } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

// ── Firebase Config — replace with your project's config ──
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCrRazbb_1q1Gq--2-nbguRQ0Sl2ziOm9Q",
  authDomain: "eshipper-f56c3.firebaseapp.com",
  databaseURL: "https://eshipper-f56c3-default-rtdb.firebaseio.com",
  projectId: "eshipper-f56c3",
  storageBucket: "eshipper-f56c3.firebasestorage.app",
  messagingSenderId: "960206640545",
  appId: "1:960206640545:web:735632739acfdab78d27e0"
};

const firebaseApp = initializeApp(FIREBASE_CONFIG);
const firebaseAuth = getAuth(firebaseApp);
const googleProvider = new GoogleAuthProvider();

// ── State ──
const JOBS_PER_PAGE = 50;
const state = {
  user: null,
  token: null,
  data: { jobs: [], customers: [], jobTypes: [], rateCards: {}, targets: {}, users: [], teams: [] },
  view: null,
  jobsPage: 0,           // current page index for All Jobs table
  offline: !navigator.onLine,
};

// ── Offline queue (IndexedDB) ──
let idbDb = null;
async function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('wh_offline', 1);
    req.onupgradeneeded = (e) => {
      e.target.result.createObjectStore('queue', { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = reject;
  });
}
async function enqueueOffline(payload) {
  const db = idbDb || (idbDb = await openIDB());
  return new Promise((resolve, reject) => {
    const tx = db.transaction('queue', 'readwrite');
    tx.objectStore('queue').add({ payload, ts: Date.now() });
    tx.oncomplete = resolve;
    tx.onerror = reject;
  });
}
async function getOfflineQueue() {
  const db = idbDb || (idbDb = await openIDB());
  return new Promise((resolve) => {
    const tx = db.transaction('queue', 'readonly');
    const req = tx.objectStore('queue').getAll();
    req.onsuccess = () => resolve(req.result);
  });
}
async function removeOfflineItem(id) {
  const db = idbDb || (idbDb = await openIDB());
  return new Promise((resolve) => {
    const tx = db.transaction('queue', 'readwrite');
    tx.objectStore('queue').delete(id);
    tx.oncomplete = resolve;
  });
}
async function syncOfflineQueue() {
  const items = await getOfflineQueue();
  const cutoff = Date.now() - 24 * 60 * 60 * 1000;
  for (const item of items) {
    if (item.ts < cutoff) {
      toast('⚠ Stale offline entry discarded (>24h)', 4000);
      await removeOfflineItem(item.id);
      continue;
    }
    try {
      await apiFetch(item.payload.url, item.payload.options);
      await removeOfflineItem(item.id);
    } catch (e) {
      console.warn('Sync failed for item', item.id, e);
    }
  }
  if (items.length > 0) {
    toast('Offline queue synced', 2000);
    await loadData();
    renderView();
  }
}

// ── Network ──
window.addEventListener('online', () => {
  state.offline = false;
  document.getElementById('offline-banner').classList.remove('show');
  setTimeout(syncOfflineQueue, 1000);
});
window.addEventListener('offline', () => {
  state.offline = true;
  document.getElementById('offline-banner').classList.add('show');
});
if (state.offline) document.getElementById('offline-banner').classList.add('show');

// ── API ──
async function getToken() {
  if (firebaseAuth.currentUser) {
    // Always force-refresh to avoid stale token 401s
    return firebaseAuth.currentUser.getIdToken(true);
  }
  return state.token;
}

async function apiFetch(url, options = {}) {
  const token = await getToken();
  const resp = await fetch(url, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      Authorization: `Bearer ${token}`,
      ...(options.headers || {}),
    },
  });
  if (!resp.ok) {
    const body = await resp.json().catch(() => ({ error: resp.statusText }));
    const msg = body.detail ? `${body.error}: ${body.detail}` : (body.error || `HTTP ${resp.status}`);
    throw new Error(msg);
  }
  return resp.json();
}

// ── Auth ──
function showSigninError(msg) {

onAuthStateChanged(firebaseAuth, async (fbUser) => {
  if (fbUser) {
    // Force-refresh token so we get the latest custom claims (role embedded in token)
    const tokenResult = await fbUser.getIdTokenResult(true);
    state.token = tokenResult.token;

    document.getElementById('signin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    const name = fbUser.displayName || fbUser.email || '?';
    const initials = name.split(/[\s.@]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
    document.getElementById('topbar-user').textContent = initials;
    document.getElementById('topbar-user').title = name;

    // Seed role from token claims immediately — so nav renders correctly
    // even if loadData() is slow or fails
    const claimRole = tokenResult.claims?.role;
    if (claimRole) {
      if (!state.user) state.user = {};
      state.user.role = claimRole;
      state.user.uid = fbUser.uid;
      state.user.displayName = name;
      localStorage.setItem('wh_role', claimRole);
      localStorage.setItem('wh_uid', fbUser.uid);
      localStorage.setItem('wh_name', name);
      renderNav(); // Show correct nav immediately from token claim
    }

    await loadData(); // Full data load — overwrites with server-confirmed role

    // Restore last visited view so browser refresh doesn't reset to dashboard
    const savedView = sessionStorage.getItem('wh_last_view');
    const allowedViews = (NAV_ITEMS[state.user?.role] || NAV_ITEMS.associate).map(i => i.id);
    if (savedView && allowedViews.includes(savedView)) {
      state.view = savedView;
    }

    renderNav();
    renderView();

    // Auto-refresh token every 50 minutes so claims stay fresh
    setInterval(async () => {
      const tr = await fbUser.getIdTokenResult(true);
      state.token = tr.token;
      // If role changed server-side, update state
      if (tr.claims?.role && tr.claims.role !== state.user?.role) {
        if (state.user) state.user.role = tr.claims.role;
        localStorage.setItem('wh_role', tr.claims.role);
        renderNav();
        renderView();
      }
    }, 50 * 60 * 1000);

    // Auto-refresh data every 60 seconds — completely silent (no view re-render = no flicker).
    // Shows a subtle "New data" pill in the topbar the user can click to apply the update.
    setInterval(async () => {
      if (document.hidden) return;
      const prevCount = (state.data.jobs || []).length;
      await loadData();
      const newCount  = (state.data.jobs || []).length;
      // Only notify if something actually changed
      if (newCount !== prevCount) showDataFreshBadge();
    }, 60 * 1000);

  } else {
    state.user = null;
    document.getElementById('signin-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

async function manualRefresh() {
  const btn = document.getElementById('refresh-btn');

async function loadData() {
  try {
    const d = await apiFetch('/api/init');
    state.user = d.user;
    // Cache role in localStorage so it survives token errors
    if (d.user?.role) localStorage.setItem('wh_role', d.user.role);
    if (d.user?.uid) localStorage.setItem('wh_uid', d.user.uid);
    if (d.user?.displayName) localStorage.setItem('wh_name', d.user.displayName);
    state.data.jobs = d.jobs || [];
    state.data.customers = d.customers || [];
    state.data.jobTypes = d.jobTypes || [];
    state.data.rateCards = d.rateCards || {};
    state.data.targets = d.targets || {};
    state.data.users = d.users || [];
    state.data.teams = d.teams || [];
    state.data.templates = d.templates || [];
  } catch (e) {
    // Restore from cache if available
    const cachedRole = localStorage.getItem('wh_role');
    const cachedUid = localStorage.getItem('wh_uid');
    const cachedName = localStorage.getItem('wh_name');
    if (cachedRole && cachedUid) {
      state.user = { role: cachedRole, uid: cachedUid, displayName: cachedName || '' };
      toast('Error: ' + e.message, 5000);
    } else {
      toast('Failed to load data: ' + e.message, 5000);
    }
  }
}

function fmt(n) { return n != null ? '$' + Number(n).toFixed(2) : '—'; }
function fmtPct(n) { return n != null ? Number(n).toFixed(1) + '%' : '—'; }
function fmtDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts._seconds ? ts._seconds * 1000 : ts);
  return d.toLocaleDateString('en-CA');
}
function statusBadge(s) { return `<span class="badge badge-${s}">${s.replace(/_/g,' ')}</span>`; }
function ratingBadge(r) { return r ? `<span class="badge badge-${r}">${r.replace(/_/g,' ')}</span>` : '—'; }
function isOverdue(j)  { if (!j.dueDate || j.status === 'completed' || j.status === 'cancelled') return false; return j.dueDate < new Date().toISOString().split('T')[0]; }
function isDueToday(j) { if (!j.dueDate || j.status === 'completed' || j.status === 'cancelled') return false; return j.dueDate === new Date().toISOString().split('T')[0]; }
function dueBadge(j) {
  if (isOverdue(j))  return `<span class="badge badge-overdue" style="margin-left:4px">Overdue</span>`;
  if (isDueToday(j)) return `<span class="badge badge-due-today" style="margin-left:4px">Due Today</span>`;
  return '';
}

function evalShowWhen(sw, values) {
  if (!sw) return true;
  const v = values[sw.field] ?? '';
  if (sw.values) return sw.values.includes(v);
  if (sw.value !== undefined) return v === sw.value;
  return v !== '';  // showWhen: { field: 'x' } → show when x has any value
}

function renderFieldInputs(fields, values = {}) {
  return fields.map(f => {
    const sw = f.showWhen || null;
    const visible = evalShowWhen(sw, values);
    const swAttr = sw ? ` data-show-when='${JSON.stringify(sw)}'` : '';
    const input = f.type === 'select' && (f.options||[]).length
      ? `<select name="${f.id}" ${f.required?'required':''} style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:14px;background:#fff">
          <option value="">— Select —</option>
          ${(f.options||[]).map(o=>`<option value="${o}"${values[f.id]===o?' selected':''}>${o}</option>`).join('')}
         </select>`
      : f.type === 'textarea'
      ? `<textarea name="${f.id}" rows="3" placeholder="${f.label}" ${f.required?'required':''}
          style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:14px;font-family:inherit;resize:vertical"
        >${values[f.id]||''}</textarea>`
      : `<input type="${f.type||'text'}" name="${f.id}" value="${values[f.id]||''}"
          placeholder="${f.label}" ${f.required?'required':''}
          data-scan-target="1" autocomplete="off"/>`;

    return `<div class="form-group" data-field-id="${f.id}"${swAttr} style="display:${visible?'block':'none'}">
      <label>${f.label}${f.required ? ' *' : ''}</label>
      ${input}
    </div>`;
  }).join('');
}

// Call after inserting renderFieldInputs HTML into the DOM to wire up show/hide logic
function wireConditionalFields(container) {
  const allGroups = container.querySelectorAll('[data-field-id][data-show-when]');
  if (!allGroups.length) return;

  // Build map: watchedFieldId → [dependent groups]
  const watchMap = {};
  allGroups.forEach(grp => {
    try {
      const sw = JSON.parse(grp.dataset.showWhen);
      if (!watchMap[sw.field]) watchMap[sw.field] = [];
      watchMap[sw.field].push({ grp, sw });
    } catch(e) {}
  });

  // Attach listeners to trigger fields
  Object.entries(watchMap).forEach(([fieldId, deps]) => {
    const trigger = container.querySelector(`[name="${fieldId}"]`);
    if (!trigger) return;
    const update = () => {
      const v = trigger.value;
      deps.forEach(({ grp, sw }) => {
        const show = sw.values ? sw.values.includes(v)
          : sw.value !== undefined ? v === sw.value
          : v !== '';
        grp.style.display = show ? 'block' : 'none';
        // Clear value when hiding so it doesn't get submitted
        if (!show) {
          const input = grp.querySelector('input,select,textarea');
          if (input) input.value = '';
        }
      });
    };
    trigger.addEventListener('change', update);
    trigger.addEventListener('input', update);
  });
}

function collectFields(form, fields) {
  const result = {};
  fields.forEach(f => {
    const grp = form.querySelector(`[data-field-id="${f.id}"]`);
    // Skip conditionally hidden fields
    if (grp && grp.style.display === 'none') return;
    const el = form.querySelector(`[name="${f.id}"]`);
    if (!el) return;
    const v = el.value.trim();
    if (!v) return;
    result[f.id] = f.type === 'number' ? parseFloat(v) : v;
  });
  return result;
}

// ── Dashboard ──
function renderDashboard() {
  const jobs = state.data.jobs;
  const today = new Date().toISOString().split('T')[0];
  const weekStart = new Date(); weekStart.setDate(weekStart.getDate() - weekStart.getDay());

  const completed = jobs.filter(j => j.status === 'completed');
  const todayJobs = completed.filter(j => fmtDate(j.completedAt) === today);
  const weekJobs = completed.filter(j => {
    const d = j.completedAt ? (j.completedAt.toDate ? j.completedAt.toDate() : new Date(j.completedAt._seconds*1000)) : null;
    return d && d >= weekStart;
  });

  const sum = (arr, key) => arr.reduce((a, b) => a + (b[key] || 0), 0);
  const open = jobs.filter(j => j.status !== 'completed' && j.status !== 'cancelled');
  const overdueJobs  = open.filter(isOverdue);
  const dueTodayJobs = open.filter(isDueToday);

  const todayRevDiff = todayJobs.length > 0 ? '+' : '';
  const kpis = [
    { val: open.length, lbl: 'Open Jobs', trend: null },
    { val: fmt(sum(todayJobs, 'revenue')), lbl: "Today's Revenue", trend: todayJobs.length > 0 ? `${todayJobs.length} jobs` : null },
    { val: fmt(sum(todayJobs, 'profit')), lbl: "Today's Profit", trend: null },
    { val: fmt(sum(weekJobs, 'revenue')), lbl: 'WTD Revenue', trend: weekJobs.length > 0 ? `${weekJobs.length} jobs` : null },
    { val: fmt(sum(weekJobs, 'profit')), lbl: 'WTD Profit', trend: null },
    { val: fmtPct(weekJobs.length ? sum(weekJobs,'marginPct')/weekJobs.length : null), lbl: 'Avg Margin WTD', trend: null },
  ];

  const statusCounts = {};
  jobs.forEach(j => { statusCounts[j.status] = (statusCounts[j.status]||0)+1; });

  const ageMs = (j) => {
    const d = j.createdAt ? (j.createdAt.toDate ? j.createdAt.toDate() : new Date(j.createdAt._seconds*1000)) : null;
    return d ? Date.now() - d.getTime() : 0;
  };

  const TWO_HOURS = 2 * 3600000;
  const unassignedOverdue = open.filter(j => {
    const noAssoc = !j.assignedAssocId || (Array.isArray(j.assignedAssocId) ? j.assignedAssocId.length === 0 : false);
    return ageMs(j) > TWO_HOURS && noAssoc;
  });

  return `
    <div class="section-header"><h1>Executive Dashboard</h1>
      <button class="btn btn-teal btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    ${unassignedOverdue.length ? `
    <div style="background:#fff5f5;border:1px solid #fc8181;border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px">

// ── Analytics helpers ──
function getJobDate(j) {
  return j.completedAt ? (j.completedAt.toDate ? j.completedAt.toDate() : new Date(j.completedAt._seconds*1000)) : null;
}

function analyticsKPIs(jobs) {
  const rev    = jobs.reduce((s,j) => s+(j.revenue||0), 0);
  const cost   = jobs.reduce((s,j) => s+(j.cost||0), 0);
  const profit = jobs.reduce((s,j) => s+(j.profit||0), 0);
  const margins = jobs.filter(j => j.marginPct != null).map(j => j.marginPct);
  const avgMargin = margins.length ? margins.reduce((s,m) => s+m, 0)/margins.length : null;
  return { rev, cost, profit, avgMargin, count: jobs.length };
}

function renderAnalyticsKPICards(curr, prior, periodLabel) {
  function delta(c, p, isMoney=true) {
    if (!p) return '';
    const diff = c - p, pct = Math.abs((diff/p)*100).toFixed(0);
    const up = diff >= 0, col = up ? '#276749' : '#c53030';
    return `<div style="font-size:11px;color:${col};font-weight:600;margin-top:3px">${up?'↑':'↓'} ${isMoney?fmt(Math.abs(diff)):Math.abs(diff).toFixed(1)+'%'} vs prior (${up?'+':''}${pct}%)</div>`;
  }
  const kpis = [
    { val: fmt(curr.rev),    lbl: 'Revenue',        d: delta(curr.rev,    prior.rev)    },
    { val: fmt(curr.cost),   lbl: 'Cost',           d: delta(curr.cost,   prior.cost)   },
    { val: fmt(curr.profit), lbl: 'Gross Profit',   d: delta(curr.profit, prior.profit) },
    { val: curr.avgMargin!=null ? curr.avgMargin.toFixed(1)+'%' : '—', lbl:'Avg Margin',
      d: curr.avgMargin!=null && prior.avgMargin!=null ? delta(curr.avgMargin, prior.avgMargin, false) : '' },
    { val: curr.count, lbl: 'Jobs Completed',       d: delta(curr.count,  prior.count, false) },
  ];
  return kpis.map(k=>`<div class="kpi"><div class="val">${k.val}</div><div class="lbl">${k.lbl}</div>${k.d}</div>`).join('');
}

function renderRatingTrendChart(jobs) {
  const now = new Date();
  const weeks = [];
  for (let i = 7; i >= 0; i--) {
    const wEnd   = new Date(now.getTime() - i * 7*24*3600000);
    const wStart = new Date(wEnd.getTime() - 7*24*3600000);
    const wJobs  = jobs.filter(j => { const d=getJobDate(j); return d && d>=wStart && d<wEnd; });
    weeks.push({
      label: wStart.toLocaleDateString('en-CA', { month:'short', day:'numeric' }),
      great: wJobs.filter(j=>j.rating==='great').length,
      good:  wJobs.filter(j=>j.rating==='good').length,
      needs: wJobs.filter(j=>j.rating==='needs_improvement').length,
    });
  }
  const maxTotal = Math.max(...weeks.map(w=>w.great+w.good+w.needs), 1);
  const MAX_H = 160;
  const hasData = weeks.some(w=>w.great+w.good+w.needs>0);

  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin:0">Weekly Rating Trend — Last 8 Weeks</div>
      <div style="display:flex;gap:14px;font-size:12px">
        <span><span style="display:inline-block;width:11px;height:11px;border-radius:2px;background:#c6f6d5;margin-right:4px;vertical-align:middle"></span>Great</span>
        <span><span style="display:inline-block;width:11px;height:11px;border-radius:2px;background:#bee3f8;margin-right:4px;vertical-align:middle"></span>Good</span>
        <span><span style="display:inline-block;width:11px;height:11px;border-radius:2px;background:#fed7d7;margin-right:4px;vertical-align:middle"></span>Needs Work</span>
      </div>
    </div>
    ${!hasData ? '<div class="empty-state">No rated jobs in the last 8 weeks</div>' : `
    <div style="display:flex;align-items:flex-end;gap:6px;height:${MAX_H}px">
      ${weeks.map(w => {
        const total = w.great+w.good+w.needs;
        if (!total) return `<div style="flex:1;height:100%;display:flex;align-items:flex-end">
          <div style="width:100%;height:2px;background:#eee;border-radius:2px"></div></div>`;
        const barH  = Math.round(total/maxTotal*MAX_H);
        const greatH = Math.round(w.great/total*barH);
        const goodH  = Math.round(w.good/total*barH);
        const needsH = barH - greatH - goodH;
        return `<div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:100%"
            title="${total} job${total!==1?'s':''} · ${w.great} Great, ${w.good} Good, ${w.needs} Needs Work">
          <div style="display:flex;flex-direction:column;border-radius:3px 3px 0 0;overflow:hidden">
            ${needsH>0?`<div style="height:${needsH}px;background:#fed7d7"></div>`:''}
            ${goodH>0 ?`<div style="height:${goodH}px;background:#bee3f8"></div>`:''}
            ${greatH>0?`<div style="height:${greatH}px;background:#c6f6d5"></div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:6px;margin-top:6px">
      ${weeks.map(w=>`<div style="flex:1;text-align:center;font-size:10px;color:var(--text-light)">${w.label}</div>`).join('')}
    </div>`}
  </div>`;
}

// ── Analytics ──
function renderAnalytics() {
  const allCompleted = state.data.jobs.filter(j => j.status === 'completed');

  // Default KPI period: last 30 days vs prior 30 days
  const now = new Date();
  const d30 = new Date(now.getTime() - 30*24*3600000);
  const d60 = new Date(now.getTime() - 60*24*3600000);
  const currJobs  = allCompleted.filter(j => { const d=getJobDate(j); return d && d>=d30; });
  const priorJobs = allCompleted.filter(j => { const d=getJobDate(j); return d && d>=d60 && d<d30; });

  // Build associate breakdown
  const jobs = allCompleted;
  const assocMap = {};
  jobs.forEach(j => {
    const jobTarget = (state.data.targets?.[j.jobTypeId]?.targetMarginPct) ?? null;
    (j.assignedAssocNames || []).forEach((name, i) => {
      const uid = (j.assignedAssocId || [])[i];
      const key = uid || name;
      if (!assocMap[key]) assocMap[key] = { name, revenue:0, cost:0, profit:0, count:0, targetMarginSum:0, targetCount:0, ratings:{great:0,good:0,needs_improvement:0} };
      assocMap[key].revenue += j.revenue || 0;
      assocMap[key].cost += j.cost || 0;
      assocMap[key].profit += j.profit || 0;
      assocMap[key].count++;
      if (jobTarget !== null) { assocMap[key].targetMarginSum += jobTarget; assocMap[key].targetCount++; }
      if (j.rating) assocMap[key].ratings[j.rating] = (assocMap[key].ratings[j.rating]||0)+1;
    });
  });
  const rows = Object.values(assocMap).sort((a,b) => {
    const ma = a.revenue > 0 ? a.profit/a.revenue : -Infinity;
    const mb = b.revenue > 0 ? b.profit/b.revenue : -Infinity;
    return mb - ma;
  });

  return `
    <div class="section-header"><h1>Profitability Analytics</h1></div>
    <div class="card">
      <div class="filter-row" id="analytics-filters">
        <div class="form-group"><label>Customer</label>
          <select id="af-customer"><option value="">All</option>${state.data.customers.map(c=>`<option>${c}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label>Job Type</label>
          <select id="af-type"><option value="">All</option>${state.data.jobTypes.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label>From</label><input type="date" id="af-from"/></div>
        <div class="form-group"><label>To</label><input type="date" id="af-to"/></div>
        <button class="btn btn-primary" onclick="applyAnalyticsFilter()">Apply</button>
        <span id="analytics-period-label" style="font-size:12px;color:var(--text-light);align-self:center">Showing: Last 30 days vs prior 30 days</span>
      </div>
    </div>
    <div class="kpi-row" id="analytics-kpis">
      ${renderAnalyticsKPICards(analyticsKPIs(currJobs), analyticsKPIs(priorJobs))}
    </div>
    ${renderRatingTrendChart(allCompleted)}
    <div class="card">
      <div class="card-title">Associate Breakdown</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Associate</th><th>Jobs</th><th>Revenue</th><th>Cost</th><th>Profit</th><th>Margin %</th><th>vs Target</th><th>Avg Rating</th><th>Great</th><th>Good</th><th>Needs Work</th></tr></thead>
          <tbody>${rows.length ? rows.map(r=>{
            const actualMargin = r.revenue > 0 ? (r.profit/r.revenue*100) : null;
            const marginStr = actualMargin !== null ? actualMargin.toFixed(1)+'%' : '—';
            const avgTarget = r.targetCount > 0 ? r.targetMarginSum / r.targetCount : null;
            const deviation = actualMargin !== null && avgTarget !== null ? (actualMargin - avgTarget) : null;
            const devStr = deviation !== null ? `${deviation >= 0 ? '+' : ''}${deviation.toFixed(1)} pp` : '—';
            const devColor = deviation === null ? 'var(--text-light)' : deviation >= 0 ? '#276749' : '#c53030';
            const totalRated = (r.ratings.great||0)+(r.ratings.good||0)+(r.ratings.needs_improvement||0);
            const avgScore = totalRated > 0 ? ((r.ratings.great||0)*3 + (r.ratings.good||0)*2 + (r.ratings.needs_improvement||0)) / totalRated : null;
            const avgScoreStr = avgScore !== null ? avgScore.toFixed(1) : '—';
            const avgScoreColor = avgScore === null ? 'var(--text-light)' : avgScore >= 2.5 ? '#276749' : avgScore >= 1.5 ? '#744210' : '#c53030';
            const avgLabel = avgScore === null ? '—' : avgScore >= 2.5 ? 'Great' : avgScore >= 1.5 ? 'Good' : 'Needs Work';
            return `<tr>
              <td><strong>${r.name}</strong></td><td>${r.count}</td>
              <td>${fmt(r.revenue)}</td><td>${fmt(r.cost)}</td><td>${fmt(r.profit)}</td>
              <td><strong>${marginStr}</strong></td>
              <td style="font-weight:600;color:${devColor}">${devStr}</td>
              <td><span style="font-weight:600;color:${avgScoreColor}">${avgLabel}</span> <span style="color:var(--text-light);font-size:11px">${avgScore!==null?avgScoreStr:''}</span></td>
              <td><span class="badge badge-great">${r.ratings.great||0}</span></td>
              <td><span class="badge badge-good">${r.ratings.good||0}</span></td>
              <td><span class="badge badge-needs_improvement">${r.ratings.needs_improvement||0}</span></td>
            </tr>`;
          }).join('') : '<tr><td colspan="11" class="empty-state">No completed jobs</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Completed Jobs</div>
      <div class="tbl-wrap">
        <table id="analytics-jobs-table">
          <thead><tr><th>Date</th><th>Customer</th><th>Type</th><th>Associates</th><th>Revenue</th><th>Cost</th><th>Profit</th><th>Margin</th><th>Rating</th></tr></thead>
          <tbody>${renderAnalyticsJobRows(jobs)}</tbody>
        </table>
      </div>
    </div>`;
}

function renderPagination(total, page, perPage, onPrev, onNext) {
  if (total <= perPage) return '';
  const totalPages = Math.ceil(total / perPage);
  const from = page * perPage + 1;
  const to = Math.min((page + 1) * perPage, total);
  return `<div class="pagination">
    <span class="page-info">Showing ${from}–${to} of ${total}</span>
    <button class="btn btn-ghost btn-sm" onclick="${onPrev}" ${page === 0 ? 'disabled' : ''}>‹ Prev</button>
    <span style="font-size:13px;font-weight:600">${page + 1} / ${totalPages}</span>
    <button class="btn btn-ghost btn-sm" onclick="${onNext}" ${page >= totalPages - 1 ? 'disabled' : ''}>Next ›</button>
  </div>`;
}

// ── Quick Assign Modal ──
function showQuickAssignModal(jobId) {
  const job = state.data.jobs.find(j => j.id === jobId);
  if (!job) return;
  const role = state.user.role;
  const _allUsers = (state.data.users||[]);
  const managers = _allUsers.filter(u => u.role==='manager'||u.role==='admin');

  // Build associate list
  let associates;
  if (role === 'admin') {
    associates = _allUsers.filter(u => u.role==='associate'||u.role==='manager'||u.role==='admin');
  } else {
    const _myTeam = (state.data.teams||[]).find(t => t.managerId === state.user.uid);
    const _memberIds = _myTeam ? (_myTeam.memberIds || []) : [];
    associates = _memberIds.length
      ? _allUsers.filter(u => _memberIds.includes(u.uid || u.id))
      : _allUsers.filter(u => u.role === 'associate');
  }

  const assocChips = associates.map(u => {
    const initials = (u.displayName||'?').split(/[\s.@]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
    const checked = (job.assignedAssocId||[]).includes(u.uid);
    return `<label style="display:flex;align-items:center;gap:6px;padding:5px 10px 5px 6px;border-radius:20px;border:2px solid ${checked?'var(--primary)':'var(--border)'};background:${checked?'#eef0ff':'#fff'};cursor:pointer;font-size:13px;font-weight:500;transition:all .15s" onclick="setTimeout(()=>{const cb=this.querySelector('input');this.style.borderColor=cb.checked?'var(--primary)':'var(--border)';this.style.background=cb.checked?'#eef0ff':'#fff'},0)">
      <input type="checkbox" class="qa-assoc-cb" value="${u.uid}" ${checked?'checked':''} style="display:none"/>
      <div class="user-avatar" style="width:22px;height:22px;font-size:9px;flex-shrink:0">${initials}</div>
      <span>${u.displayName}</span>
    </label>`;
  }).join('');

  const managerDropdown = `
    <div class="form-group">
      <label>Manager</label>
      <select id="qa-manager-sel" style="width:100%;padding:9px;border:1px solid var(--border);border-radius:7px;font-size:14px">
        <option value="">— No manager —</option>
        ${managers.map(m=>`<option value="${m.uid}" ${job.assignedManagerId===m.uid?'selected':''}>${m.displayName}</option>`).join('')}
      </select>
    </div>`;

  // office_support: manager only
  if (role === 'office_support') {
    showModal(`
      <div class="modal-header">
        <h2>Reassign — ${job.customerId}</h2>
        <button onclick="this.closest('.modal-overlay').remove()" style="background:none;color:#fff;font-size:20px">✕</button>
      </div>
      <div class="modal-body">
        <div style="margin-bottom:10px;font-size:13px;color:var(--text-light)">Current status: ${statusBadge(job.status)}</div>
        ${managerDropdown}
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="submitQuickAssignManager('${jobId}')">Update Manager</button>
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      </div>`);
    return;
  }

  // admin: manager + associates
  // manager: current manager shown (read-only) + associates
  showModal(`
    <div class="modal-header">
      <h2>Reassign — ${job.customerId}</h2>
      <button onclick="this.closest('.modal-overlay').remove()" style="background:none;color:#fff;font-size:20px">✕</button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:12px;font-size:13px;color:var(--text-light)">Current status: ${statusBadge(job.status)}</div>
      ${role === 'admin' ? managerDropdown : `<div class="form-group"><label>Manager</label><div style="padding:8px;background:var(--grey);border-radius:6px;font-size:13px">${job.assignedManagerName||'— Not assigned —'}</div></div>`}
      <div class="form-group">
        <label>Associates</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;padding:10px;border:1px solid var(--border);border-radius:8px;background:#f9f9fb;min-height:44px">
          ${associates.length ? assocChips : '<p style="color:var(--text-light);font-size:13px;margin:0">No users found. Invite users first.</p>'}
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="submitQuickAssignBoth('${jobId}')">Update Assignment</button>
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
    </div>`);
}

async function submitQuickAssignManager(jobId) {
  const mgr = document.getElementById('qa-manager-sel')?.value;
  if (!mgr) { toast('Select a manager first'); return; }
  try {
    await apiFetch(`/api/jobs/${jobId}/assign-manager`, { method: 'PUT', body: JSON.stringify({ managerId: mgr }) });
    await loadData(); document.querySelector('.modal-overlay')?.remove(); renderView();
    toast('Manager updated');
  } catch(err) { toast('Error: ' + err.message, 3000); }
}

// Combined assign for admin/manager modal (manager + associates)
async function submitQuickAssignBoth(jobId) {
  const mgrSel = document.getElementById('qa-manager-sel');
  const selected = [...document.querySelectorAll('.qa-assoc-cb:checked')].map(cb => cb.value);
  if (!selected.length) { toast('Select at least one associate'); return; }
  try {
    // Update manager if dropdown present and value changed
    if (mgrSel?.value) {
      await apiFetch(`/api/jobs/${jobId}/assign-manager`, { method: 'PUT', body: JSON.stringify({ managerId: mgrSel.value }) });
    }
    await apiFetch(`/api/jobs/${jobId}/assign-associate`, {
      method: 'PUT', body: JSON.stringify({ associateIds: selected }),
    });
    await loadData();
    document.querySelector('.modal-overlay')?.remove();
    renderView();
    toast('Assignment updated');
  } catch(err) { toast('Error: ' + err.message, 3000); }
}

async function submitQuickAssign(jobId) {
  const selected = [...document.querySelectorAll('.qa-assoc-cb:checked')].map(cb => cb.value);
  if (!selected.length) { toast('Select at least one associate'); return; }
  try {
    await apiFetch(`/api/jobs/${jobId}/assign-associate`, {
      method: 'PUT', body: JSON.stringify({ associateIds: selected }),
    });
    await loadData();
    document.querySelector('.modal-overlay')?.remove();
    renderView();
    toast('Assignment updated');
  } catch(err) { toast('Error: ' + err.message, 3000); }
}

// ── Template customer helpers ──────────────────────────────────────────────────
// Normalise old single-string customerId and new customerIds array to one format
function tplCustomerIds(tpl) {
  if (Array.isArray(tpl.customerIds)) return tpl.customerIds;
  if (tpl.customerId) return [tpl.customerId];
  return [];
}
function customerIdsLabel(tpl) {
  const ids = tplCustomerIds(tpl);
  if (!ids.length) return '🏢 All Customers';
  if (ids.length === 1) return ids[0];
  if (ids.length === 2) return ids.join(', ');
  return `${ids[0]} +${ids.length - 1} more`;
}
// Builds a checkbox-based multi-customer picker
function buildCustomerPickerHtml(pickerId, selectedIds) {
  const customers = state.data.customers || [];
  const allSelected = !selectedIds || selectedIds.length === 0;
  return `
    <div style="border:1px solid var(--border);border-radius:7px;overflow:hidden">
      <label style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f7f8fc;cursor:pointer;border-bottom:1px solid var(--border)">
        <input type="checkbox" id="${pickerId}-all" ${allSelected ? 'checked' : ''}
          onchange="toggleAllCustomers('${pickerId}')"/>
        <strong style="font-size:13px">All Customers</strong>
      </label>
      <div id="${pickerId}-list" style="max-height:160px;overflow-y:auto;padding:6px 12px;display:flex;flex-direction:column;gap:4px${allSelected ? ';opacity:0.45;pointer-events:none' : ''}">
        ${customers.map(c => `
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:2px 0">
            <input type="checkbox" name="${pickerId}-item" value="${c}"
              ${(allSelected || (Array.isArray(selectedIds) && selectedIds.includes(c))) ? 'checked' : ''}/>
            ${c}
          </label>`).join('')}
      </div>
    </div>`;
}
function toggleAllCustomers(pickerId) {
  const allCb = document.getElementById(`${pickerId}-all`);
  const listDiv = document.getElementById(`${pickerId}-list`);
  const itemCbs = listDiv?.querySelectorAll('input[type="checkbox"]') || [];
  if (allCb?.checked) {
    if (listDiv) { listDiv.style.opacity = '0.45'; listDiv.style.pointerEvents = 'none'; }
    itemCbs.forEach(cb => cb.checked = true);
  } else {
    if (listDiv) { listDiv.style.opacity = '1'; listDiv.style.pointerEvents = ''; }
    itemCbs.forEach(cb => cb.checked = false);
  }
}
function getCustomerPickerValue(pickerId) {
  const allCb = document.getElementById(`${pickerId}-all`);
  if (allCb?.checked) return []; // empty = all customers
  const listDiv = document.getElementById(`${pickerId}-list`);
  return [...(listDiv?.querySelectorAll('input[type="checkbox"]:checked') || [])].map(cb => cb.value);
}

// Open template picker on Create Job page
function openLoadTemplateModal() {
  const templates = state.data.templates || [];
  if (!templates.length) { toast('No templates saved yet'); return; }
  let filtered = templates;
  const overlay = showModal(`
    <div class="modal-header"><h2>Load Template</h2>

function renderTemplatePickerItems(templates) {
  if (!templates.length) return `<div style="color:var(--text-light);font-size:13px;text-align:center;padding:20px">No templates match</div>`;
  return templates.map(t => {
    const locCount = (t.locations||[]).length;

    return `
    <div style="border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:background .15s"
      onmouseenter="this.style.background='#f0f4ff'" onmouseleave="this.style.background=''"
      onclick="applyTemplate('${t.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center">

          <div style="font-weight:600;font-size:14px;margin-bottom:3px">${t.name}</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">
            ${jtBadge(t.jobTypeId)}
            <span style="font-size:12px;color:var(--text-light)">${customerIdsLabel(t)}${locCount ? ` · ${locCount} loc` : ''}${dueLabel}</span>
          </div>
        </div>
        <button class="btn btn-primary btn-sm">Use</button>
      </div>
    </div>`;
  }).join('');
}

function filterTemplateList(query) {
  const q = query.toLowerCase();
  const templates = state.data.templates || [];
  const filtered = q ? templates.filter(t =>
    t.name.toLowerCase().includes(q) ||
    tplCustomerIds(t).some(c => c.toLowerCase().includes(q)) ||
    t.jobTypeId.toLowerCase().includes(q)
  ) : templates;
  const list = document.getElementById('tpl-picker-list');
  if (list) list.innerHTML = renderTemplatePickerItems(filtered);
}

function applyTemplate(tplId) {
  const tpl = (state.data.templates||[]).find(t => t.id === tplId);
  if (!tpl) return;
  const ids = tplCustomerIds(tpl);
  // Multiple specific customers → ask which one to use for this job
  if (ids.length > 1) {
    document.querySelector('.modal-overlay')?.remove();
    showModal(`
      <div class="modal-header"><h2>Select Customer</h2>
        <button onclick="this.closest('.modal-overlay').remove()" style="background:none;color:#fff;font-size:20px">✕</button>
      </div>
      <div class="modal-body">
        <p style="margin-bottom:14px;color:var(--text-light);font-size:13px">This template supports multiple customers. Which customer is this job for?</p>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${ids.map(c => `
            <button class="btn btn-ghost" style="text-align:left;justify-content:flex-start;padding:10px 14px"
              onclick="document.querySelector('.modal-overlay')?.remove();_applyTemplateWithCustomer('${tplId}','${c.replace(/'/g, "\\'")}')">
              🏢 ${c}
            </button>`).join('')}
        </div>
      </div>`);
    return;
  }
  _applyTemplateWithCustomer(tplId, ids.length === 1 ? ids[0] : null);
}

function _applyTemplateWithCustomer(tplId, customerId) {
  const tpl = (state.data.templates||[]).find(t => t.id === tplId);
  if (!tpl) return;
  document.querySelector('.modal-overlay')?.remove();
  if (state.view !== 'create-job') {
    state.view = 'create-job';
    renderNav();
    renderView();
    setTimeout(() => _fillTemplateIntoForm(tpl, customerId), 50);
  } else {
    _fillTemplateIntoForm(tpl, customerId);
  }
  toast(`Template "${tpl.name}" loaded`);
}

function useTemplate(tplId) {
  applyTemplate(tplId);
}

function _fillTemplateIntoForm(tpl, customerOverride) {
  const form = document.getElementById('create-job-form');
  if (!form) return;
  // Customer — use override (chosen from picker) or single stored customer; skip if all-customers template
  const custSel = form.querySelector('[name="customerId"]');
  if (custSel) {
    const ids = tplCustomerIds(tpl);
    const customerToSet = customerOverride || (ids.length === 1 ? ids[0] : null);
    if (customerToSet) custSel.value = customerToSet;
  }
  // Job type
  const jtSel = form.querySelector('[name="jobTypeId"]');
  if (jtSel) {
    jtSel.value = tpl.jobTypeId || '';
    jtSel.dispatchEvent(new Event('change'));
  }
  // Manager
  const mgrSel = form.querySelector('[name="assignedManagerId"]');
  if (mgrSel) mgrSel.value = tpl.assignedManagerId || '';
  // Due date
  const dueDateInput = form.querySelector('[name="dueDate"]');
  if (dueDateInput) {
    if (tpl.dueDaysOffset != null) {
      const d = new Date();
      d.setDate(d.getDate() + (tpl.dueDaysOffset || 0));
      dueDateInput.value = d.toISOString().split('T')[0];
    } else {
      dueDateInput.value = '';
    }
  }
  // Text fields
  const instrEl = form.querySelector('[name="instructions"]');
  if (instrEl) instrEl.value = tpl.instructions || '';
  const notesEl = form.querySelector('[name="notes"]');
  if (notesEl) notesEl.value = tpl.notes || '';
  // Billable
  const billableEl = form.querySelector('[name="billable"]');
  if (billableEl) billableEl.checked = tpl.billable ?? true;
  // Locations
  const locList = document.getElementById('cj-locations-list');
  if (locList) {
    locList.innerHTML = '';
    (tpl.locations || []).forEach(loc => {
      const row = document.createElement('div');
      row.className = 'loc-row';
      row.style.cssText = 'display:flex;gap:6px;align-items:center;margin-bottom:6px';
      row.dataset.locJson = JSON.stringify(loc);
      row.innerHTML = `
        <input class="loc-name" value="${(loc.name||'').replace(/"/g,'&quot;')}" placeholder="Location name"
          style="flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px"/>
        <input class="loc-instr" value="${(loc.instructions||'').replace(/"/g,'&quot;')}" placeholder="Instructions"
          style="flex:1.5;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px"/>
        <button type="button" onclick="this.parentElement.remove()"
          style="background:var(--danger);color:#fff;border:none;border-radius:4px;padding:5px 8px;cursor:pointer;font-size:12px">✕</button>`;
      locList.appendChild(row);
    });
  }
  // CSV capture fields
  if (tpl.csvCaptureFields && tpl.csvCaptureFields.length) {
    window._csvCaptureCols = tpl.csvCaptureFields.map(f => f.label || f.id);
    const info = document.getElementById('cj-loc-csv-info');
    if (info) {
      info.style.display = 'block';
      info.textContent = `Capture fields from template: ${window._csvCaptureCols.join(', ')}`;
    }
  }
}

      </div>

    <div class="modal-footer">
      <button class="btn btn-primary" onclick="submitSaveTemplate()">Save Template</button>

    </div>`);

async function submitSaveTemplate() {
  const name = document.getElementById('tpl-save-name')?.value.trim();
  if (!name) { toast('Template name required'); return; }
  const form = document.getElementById('create-job-form');
  if (!form) return;
  const jobTypeId = form.querySelector('[name="jobTypeId"]')?.value || '';
  const customerId = form.querySelector('[name="customerId"]')?.value || '';
  const assignedManagerId = form.querySelector('[name="assignedManagerId"]')?.value || null;
  const billable = form.querySelector('[name="billable"]')?.checked ?? true;
  const instructions = form.querySelector('[name="instructions"]')?.value || '';
  const notes = form.querySelector('[name="notes"]')?.value || '';
  const dueDaysRaw = document.getElementById('tpl-save-due')?.value;
  const dueDaysOffset = dueDaysRaw !== '' && dueDaysRaw != null ? parseInt(dueDaysRaw) : null;
  // Collect locations from current rows
  const locationRows = [...document.querySelectorAll('#cj-locations-list .loc-row')];
  const locations = locationRows.map(row => {
    if (row.dataset.locJson) {
      const d = JSON.parse(row.dataset.locJson);
      return { name: d.name, instructions: d.instructions || '', referenceData: d.referenceData || {} };
    }
    return { name: row.querySelector('.loc-name')?.value.trim() || '', instructions: row.querySelector('.loc-instr')?.value.trim() || '' };
  }).filter(l => l.name);
  const csvCaptureFields = (window._csvCaptureCols || []).map(n => ({ id: n.toLowerCase().replace(/\s+/g,'_'), label: n, type: 'text' }));
  try {
    const customerIds = customerId ? [customerId] : [];
    const result = await apiFetch('/api/templates', { method: 'POST', body: JSON.stringify({
      name, jobTypeId, customerIds, assignedManagerId, billable,
      dueDaysOffset, instructions, notes, locations, csvCaptureFields,
    })});
    // Add to local state
    state.data.templates.unshift({ id: result.id, name, jobTypeId, customerIds, assignedManagerId, billable, dueDaysOffset, instructions, notes, locations, csvCaptureFields });
    document.querySelector('.modal-overlay')?.remove();
    toast(`✅ Template "${name}" saved`);
  } catch (err) { toast('Error: ' + err.message, 3000); }
}

async function submitEditTemplate(tplId) {
  const tpl = (state.data.templates||[]).find(t => t.id === tplId);

  if (!name) { toast('Template name required'); return; }
  const jobTypeId = document.getElementById('etpl-jobtype')?.value;
  const customerIds = getCustomerPickerValue('etpl-cpicker');
  const assignedManagerId = document.getElementById('etpl-manager')?.value || null;
  const billable = document.getElementById('etpl-billable')?.checked ?? true;
  const instructions = document.getElementById('etpl-instr')?.value || '';
  const notes = document.getElementById('etpl-notes')?.value || '';
  const dueDaysRaw = document.getElementById('etpl-due')?.value;

  clearTimeout(_alSearchTimer);

function filterActivityLog() {
  const wrap = document.getElementById('al-table-wrap');
  if (!wrap) return;
  const q = (document.getElementById('al-search')?.value || '').toLowerCase();
  const logs = (window._activityLogs || []).filter(l => {
    if (!q) return true;
    return (l.action||'').toLowerCase().includes(q) ||
           (l.entityLabel||'').toLowerCase().includes(q) ||
           (l.performedByName||'').toLowerCase().includes(q) ||
           (l.performedByEmail||'').toLowerCase().includes(q);
  });
  if (!logs.length) {
    wrap.innerHTML = '<div class="empty-state">No log entries found</div>';
    return;
  }
  const entityColor = { job:'var(--primary)', user:'var(--teal)', config:'var(--warning)', template:'#805ad5', team:'#d69e2e' };
  const rows = logs.map(l => {
    const ts = l.timestamp?.toDate ? l.timestamp.toDate() : new Date((l.timestamp?._seconds||0)*1000);
    const timeStr = ts.toLocaleString('en-CA', { dateStyle:'medium', timeStyle:'short' });
    const icon = ACTION_ICONS[l.action] || '📌';
    const actionLabel = (l.action||'').replace(/\./g,' › ').replace(/_/g,' ');
    const badgeColor = entityColor[l.entity] || '#888';
    let metaHtml = '';
    if (l.metadata) {
      const parts = Object.entries(l.metadata)
        .filter(([,v]) => v !== null && v !== undefined)
        .map(([k,v]) => `<span style="color:var(--text-light);font-size:11px">${k}: <strong>${Array.isArray(v)?v.join(', '):v}</strong></span>`);
      if (parts.length) metaHtml = `<div style="margin-top:3px;display:flex;flex-wrap:wrap;gap:8px">${parts.join('')}</div>`;
    }
    if (l.changes) {
      const parts = Object.entries(l.changes)
        .map(([k,v]) => `<span style="color:var(--text-light);font-size:11px">${k}: <em>${v.from??'—'}</em> → <strong>${v.to??'—'}</strong></span>`);
      if (parts.length) metaHtml += `<div style="margin-top:3px;display:flex;flex-wrap:wrap;gap:8px">${parts.join('')}</div>`;
    }
    return `<tr>
      <td style="white-space:nowrap">${timeStr}</td>
      <td><span style="background:${badgeColor};color:#fff;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:600">${l.entity||''}</span></td>
      <td>${icon} ${actionLabel}</td>
      <td><div style="font-weight:600">${l.entityLabel||l.entityId||'—'}</div>${metaHtml}</td>
      <td style="white-space:nowrap">${l.performedByName||'—'}<div style="font-size:11px;color:var(--text-light)">${l.performedByRole||''}</div></td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `<table class="al-table">
    <thead><tr><th>Timestamp</th><th>Category</th><th>Action</th><th>Details</th><th>Performed By</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── CSV Parsing Utility ──
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').replace(/^"|"$/g, ''));
    return obj;
  });
}

function downloadCSVTemplate(filename, headers, sampleRows) {
  const rows = [headers.join(','), ...sampleRows.map(r => r.join(','))];
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

  try {

    state.data.jobs = state.data.jobs.map(j => j.customerId === oldName ? { ...j, customerId: newName } : j);

async function seedDefaultRates(btn) {
  const customers = state.data.customers || [];

  const choice = confirm(msg);
  if (!choice) return;

  const overwrite = confirm('Overwrite existing rates too?\n\nOK = replace all clients\nCancel = only fill clients with no rates');

  if (btn) { btn.disabled = true; btn.textContent = 'Applying…'; }
  try {
    const result = await apiFetch('/api/rates/seed-defaults', {
      method: 'POST',
      body: JSON.stringify({ overwrite }),
    });
    state.data.rateCards = result.rates;
    const msg = `Done! Applied to ${result.seeded.length} client(s)${result.skipped.length ? `, skipped ${result.skipped.length} (already had rates)` : ''}.`;

async function uploadRatesCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const text = await file.text();
  const rows = parseCSV(text);
  const newRates = JSON.parse(JSON.stringify(state.data.rateCards));
  rows.forEach(r => {
    const { customer, job_type_id, field_id, rate } = r;
    if (!customer || !job_type_id || !field_id) return;
    if (!newRates[customer]) newRates[customer] = {};
    if (!newRates[customer][job_type_id]) newRates[customer][job_type_id] = {};
    newRates[customer][job_type_id][field_id] = parseFloat(rate) || 0;
  });
  try {
    await apiFetch('/api/rates', { method: 'PUT', body: JSON.stringify(newRates) });
    state.data.rateCards = newRates;
    toast(`Imported ${rows.length} rate rows`);
    renderView();

}

async function submitEditJobType(id) {
  const name = document.getElementById('jt-edit-name')?.value.trim();
  if (!name) { toast('Name required'); return; }
  const color = document.getElementById('jt-color')?.value || 'purple';

function collectFieldRows() {
  const rows = document.querySelectorAll('#jt-fields-list .field-row');
  const fields = [];
  rows.forEach(row => {
    const mainRow = row.querySelector('div');
    const inputs = mainRow ? mainRow.querySelectorAll('input[type=text]') : row.querySelectorAll('input[type=text]');
    const select = row.querySelector('select.field-type-sel');
    const required = row.querySelector('input[type=checkbox]')?.checked || false;
    const fieldId = inputs[0]?.value.trim().replace(/\s+/g,'_').toLowerCase();
    const label = inputs[1]?.value.trim();
    const optionsRaw = row.querySelector('.field-options-input')?.value.trim() || '';
    const options = select?.value === 'select' ? optionsRaw.split(',').map(s=>s.trim()).filter(Boolean) : [];
    // Conditional show/when
    const swFieldVal = row.querySelector('.sw-field')?.value.trim() || '';
    const swValuesRaw = row.querySelector('.sw-values')?.value.trim() || '';
    let showWhen = null;
    if (swFieldVal) {
      const vals = swValuesRaw ? swValuesRaw.split(',').map(s=>s.trim()).filter(Boolean) : [];
      showWhen = vals.length > 1 ? { field: swFieldVal, values: vals }
        : vals.length === 1 ? { field: swFieldVal, value: vals[0] }
        : { field: swFieldVal };
    }
    if (fieldId && label) {
      const f = { id: fieldId, label, type: select?.value || 'text', required };
      if (options.length) f.options = options;
      if (showWhen) f.showWhen = showWhen;
      fields.push(f);
    }
  });
  return fields;
}

async function uploadJobTypesCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const text = await file.text();
  const rows = parseCSV(text);
  // Group rows by job type id
  const typeMap = {};
  rows.forEach(r => {
    const { id, name, field_id, field_label, field_type, required } = r;
    if (!id || !field_id) return;
    if (!typeMap[id]) typeMap[id] = { id, name: name || id, fields: [] };
    typeMap[id].fields.push({
      id: field_id,
      label: field_label || field_id,
      type: field_type || 'text',
      required: required === 'true',
    });
  });
  const newTypes = [...state.data.jobTypes];
  Object.values(typeMap).forEach(jt => {
    const idx = newTypes.findIndex(t => t.id === jt.id);
    if (idx >= 0) newTypes[idx] = jt;
    else newTypes.push(jt);
  });
  try {
    await apiFetch('/api/jobtypes', { method: 'PUT', body: JSON.stringify({ list: newTypes }) });
    state.data.jobTypes = newTypes;
    toast(`Imported ${Object.keys(typeMap).length} job type(s)`);
    renderView();
  } catch (err) {
    toast('Error: ' + err.message, 3000);
  }
  input.value = '';
}

async function deleteJobType(id) {

}

let _logiwaClients = [];

async function loadLogiwaStatus() {
  try {
    const s = await apiFetch('/api/logiwa/status');
    const badge = document.getElementById('logiwa-status-badge');
    if (!badge) return;

    if (!s.configured) {
      badge.innerHTML = `<span style="background:#fef3c7;color:#92400e;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600">Not configured</span>`;
      return;
    }
    if (s.ok) {
      badge.innerHTML = `<span style="background:#d1fae5;color:#065f46;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600">✓ Connected</span>`;
    } else {
      badge.innerHTML = `<span style="background:#fee2e2;color:#991b1b;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600">✗ Auth failed</span>`;
    }

    // Populate fields
    const emailEl = document.getElementById('logiwa-email');
    const passEl = document.getElementById('logiwa-password');
    const enabledEl = document.getElementById('logiwa-enabled');
    if (emailEl) emailEl.value = s.email || '';
    if (passEl && s.ok) passEl.value = '••••••••';
    if (enabledEl) enabledEl.checked = !!s.enabled;

    // Show mapping and sync sections whenever credentials are valid
    const mapSec = document.getElementById('logiwa-client-mapping-section');
    const syncSec = document.getElementById('logiwa-sync-section');
    const syncDiv = document.getElementById('logiwa-sync-divider');
    if (mapSec && s.ok) { mapSec.style.display = ''; renderLogiwaMappings(s.clientMappings || {}); }
    if (syncSec && s.ok) { syncSec.style.display = ''; if (syncDiv) syncDiv.style.display = ''; }
    // Store client mappings globally for movement modal lookups
    if (s.clientMappings) state._logiwaClientMappings = s.clientMappings;
    // Show ongoing sync progress if already running
    if (s.ok && s.syncStatus === 'running') {
      const syncStatus = document.getElementById('logiwa-sync-status');
      const syncBtn = document.getElementById('logiwa-sync-btn');
      // Check if sync is stale (started > 30 min ago)
      const startedMs = s.syncStarted ? (s.syncStarted._seconds ? s.syncStarted._seconds * 1000 : new Date(s.syncStarted).getTime()) : 0;
      const isStale = startedMs && (Date.now() - startedMs) > 30 * 60 * 1000;
      if (isStale) {
        if (syncStatus) syncStatus.innerHTML = `Sync appears stuck. <a href="#" onclick="resetLogiwaSync();return false" style="color:var(--primary)">Reset</a>`;
        if (syncBtn) { syncBtn.disabled = false; syncBtn.textContent = '⟳ Sync Now'; }
      } else {
        const phaseText = s.syncPhase === 'writing'
          ? `Writing to database… ${s.syncProgress || 0} / ${s.syncTotal || '?'}`
          : `Fetching from Logiwa… ${s.syncProgress || 0} items`;
        if (syncStatus) syncStatus.innerHTML = `${phaseText} &nbsp;<a href="#" onclick="resetLogiwaSync();return false" style="color:#999;font-size:12px">cancel</a>`;
        if (syncBtn) { syncBtn.disabled = true; syncBtn.textContent = '⟳ Syncing…'; }
      }
    }

    // Populate client dropdown for per-client sync (also populates mapping dropdowns)
    if (s.ok) loadLogiwaClients(true);

    // Show last sync status
    if (s.ok && s.lastSync) {
      const syncStatus = document.getElementById('logiwa-sync-status');
      if (syncStatus) syncStatus.textContent = `Last sync: ${new Date(s.lastSync._seconds ? s.lastSync._seconds*1000 : s.lastSync).toLocaleString()}`;
    }
  } catch (err) {
    console.error('Logiwa status error:', err);
  }
}

async function saveLogiwaConfig() {
  const btn = document.getElementById('logiwa-save-btn');

  try {

async function startLogiwaSync() {
  const btn = document.getElementById('logiwa-sync-btn');
  const status = document.getElementById('logiwa-sync-status');
  const sel = document.getElementById('logiwa-sync-client');
  const clientId = sel ? sel.value : '';
  const clientLabel = sel && clientId ? sel.options[sel.selectedIndex].text : 'all clients';
  if (btn) { btn.disabled = true; btn.textContent = '⟳ Syncing…'; }
  if (status) status.textContent = `Syncing ${clientLabel}…`;
  const syncStarted = Date.now();
  try {
    await apiFetch('/api/logiwa/sync', { method: 'POST', body: JSON.stringify(clientId ? { clientId } : {}) });
    toast(`Logiwa sync started for ${clientLabel}`);
    // Poll until syncStatus === 'done' and lastSync is newer than when we started
    let polls = 0;
    const pollTimer = setInterval(async () => {
      polls++;
      if (polls > 120) { clearInterval(pollTimer); if (btn) { btn.disabled = false; btn.textContent = '⟳ Sync Now'; } return; }
      try {
        const s = await apiFetch('/api/logiwa/status');
        const syncTs = s.lastSync ? (s.lastSync._seconds ? s.lastSync._seconds*1000 : new Date(s.lastSync).getTime()) : 0;
        if (status) {
          if (s.syncStatus === 'running') {
            if (s.syncPhase === 'writing') {
              status.textContent = `Writing to database… ${s.syncProgress || 0} / ${s.syncTotal || '?'} items`;
            } else {
              status.textContent = `Fetching from Logiwa… ${s.syncProgress || 0} items`;
            }
          } else if (s.syncStatus === 'error') {
            status.textContent = `Error: ${s.syncError || 'unknown'}`;
            clearInterval(pollTimer);
            if (btn) { btn.disabled = false; btn.textContent = '⟳ Sync Now'; }
          }
        }
        if (s.syncStatus === 'done' && syncTs > syncStarted) {
          if (status) status.textContent = `✓ Synced ${s.syncCount || 0} items — ${new Date(syncTs).toLocaleString()}`;
          if (btn) { btn.disabled = false; btn.textContent = '⟳ Sync Now'; }
          clearInterval(pollTimer);
        }
      } catch {}
    }, 4000);
  } catch (err) { toast('Error: ' + err.message, 3000); if (btn) { btn.disabled = false; btn.textContent = '⟳ Sync Now'; } }
}

async function searchLogiwaInventory(jobId) {
  const sku = document.getElementById('lgw-sku-input')?.value?.trim();
  const statusEl = document.getElementById('lgw-search-status');
  const resultsSection = document.getElementById('lgw-results-section');
  const sel = document.getElementById('lgw-inv-sel');
  const btn = document.getElementById('lgw-search-btn');
  if (!sku) { if (statusEl) statusEl.textContent = 'Enter a SKU to search'; return; }

  if (btn) { btn.disabled = true; btn.textContent = 'Searching…'; }
  if (statusEl) statusEl.textContent = 'Searching Logiwa…';
  if (resultsSection) resultsSection.style.display = 'none';

  try {
    // Get clientId from job's customer mapping if available
    const job = (state.data.jobs || []).find(j => j.id === jobId);
    const clientMappings = state._logiwaClientMappings || {};
    const clientId = job?.customerId ? (clientMappings[job.customerId] || '') : '';

    const params = new URLSearchParams({ sku });
    if (clientId) params.set('clientId', clientId);
    const r = await apiFetch(`/api/logiwa/search?${params}`);
    const items = r.items || [];

    if (!items.length) {
      if (statusEl) statusEl.textContent = `No inventory found for "${sku}"`;
      return;
    }
    if (statusEl) statusEl.textContent = `Found ${items.length} record(s)`;
    if (sel) {
      sel.innerHTML = items.map(i =>
        `<option value="${i.inventoryId}" data-item="${encodeURIComponent(JSON.stringify(i))}">${i.sku} | ${i.location || 'No location'} | Avail: ${i.availQty ?? i.totalQty}</option>`
      ).join('');
    }
    if (resultsSection) resultsSection.style.display = '';
  } catch(err) {
    if (statusEl) statusEl.textContent = 'Error: ' + err.message;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Search'; }
  }
}

async function submitLogiwaMovement(jobId, locId) {
  const invSel = document.getElementById('lgw-inv-sel');
  const invManual = document.getElementById('lgw-inv-manual');
  const inventoryId = (invSel?.value || invManual?.value || '').trim();
  const type = document.getElementById('lgw-type')?.value;
  const quantity = parseInt(document.getElementById('lgw-qty')?.value || '0');
  const note = document.getElementById('lgw-note')?.value?.trim() || '';
  const targetLocationCode = document.getElementById('lgw-dest-location')?.value?.trim() || '';
  const errEl = document.getElementById('lgw-error');

  // Parse full item data from selected option (needed for transfer)
  const selectedOpt = invSel?.options[invSel?.selectedIndex];
  const itemData = selectedOpt?.dataset?.item ? JSON.parse(decodeURIComponent(selectedOpt.dataset.item)) : null;

  if (!inventoryId) { if (errEl) { errEl.textContent = 'Select or enter an inventory ID'; errEl.style.display = ''; } return; }
  if (!quantity || quantity < 1) { if (errEl) { errEl.textContent = 'Quantity must be at least 1'; errEl.style.display = ''; } return; }
  if (type === 'transfer' && !targetLocationCode) { if (errEl) { errEl.textContent = 'Enter destination location code for transfer'; errEl.style.display = ''; } return; }

  const submitBtn = document.querySelector('.modal-footer .btn-primary');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Posting…'; }

  try {
    await apiFetch('/api/logiwa/movement', {
      method: 'POST',
      body: JSON.stringify({
        type, inventoryId, quantity, note, jobId, locId, targetLocationCode,
        // Source item fields needed for transfer payload
        productId: itemData?.productId,
        clientId: itemData?.clientId,
        warehouseId: itemData?.warehouseId,
        sourceLocationId: itemData?.locationId,
        sourceLocationCode: itemData?.location,
        packTypeId: itemData?.packTypeId,
      }),
    });
    document.querySelector('.modal-overlay')?.remove();
    const typeLabel = type === 'transfer' ? `transferred ${quantity} units → ${targetLocationCode}` : `${type} ${quantity} units`;
    toast(`✓ Logiwa: ${typeLabel}`);
  } catch (err) {
    if (errEl) { errEl.textContent = 'Error: ' + err.message; errEl.style.display = ''; errEl.style.whiteSpace = 'pre-wrap'; }
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Post to Logiwa'; }
    console.error('[Logiwa movement]', err);
  }
}

async function submitSelfLog(e) {
  e.preventDefault();
  const form = e.target;
  const jobTypeId = form.jobTypeId.value;
  const customerId = form.customerId.value;
  if (!jobTypeId || !customerId) { toast('Select customer and job type'); return; }

  const fields = collectFields(form, getJobFields(jobTypeId));
  const body = {
    jobTypeId, customerId, fields,
    billable: ['admin','manager'].includes(state.user.role) ? (form.billable?.checked ?? true) : true,
    dueDate: form.dueDate.value || null,
    notes: form.notes.value,
  };

  try {
    const btn = form.querySelector('button[type=submit]');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    if (state.offline) {
      await enqueueOffline({ url: '/api/jobs', options: { method: 'POST', body: JSON.stringify(body) } });
      toast('Saved offline — will sync on reconnect');
      form.reset();
      document.getElementById('self-log-fields').innerHTML = '';
    } else {
      const job = await apiFetch('/api/jobs', { method: 'POST', body: JSON.stringify(body) });
      // Submit for review instead of auto-completing
      await apiFetch(`/api/jobs/${job.id}/submit-review`, {
        method: 'PUT', body: JSON.stringify({ fields, billable: body.billable, associateNotes: '' })
      });
      await loadData();
      renderView();
      toast('Job submitted for manager review');
    }
  } catch (err) {
    toast('Error: ' + err.message, 3000);
  } finally {
    const btn = form.querySelector('button[type=submit]');
    if (btn) { btn.disabled = false; btn.innerHTML = 'Save & Complete'; }
  }
}
