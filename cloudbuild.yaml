steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/warehouse-billing/warehouse-billing', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/warehouse-billing/warehouse-billing']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - warehouse-billing
      - --image=northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/warehouse-billing/warehouse-billing
      - --region=northamerica-northeast2
      - --platform=managed
      - --allow-unauthenticated
images:
  - 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/warehouse-billing/warehouse-billing'
# trigger
