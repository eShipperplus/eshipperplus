name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'public/manifest.json'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      # ── Get live Cloud Run URL ────────────────────────────────────────────────
      - name: Get Cloud Run URL
        id: cloudrun
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          URL=$(gcloud run services describe warehouse-billing \
            --region northamerica-northeast2 \
            --project "$GCP_PROJECT_ID" \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Cloud Run URL: $URL"

      # ── Generate or restore keystore ─────────────────────────────────────────
      - name: Set up signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/keystore.jks
            echo "Restored keystore from secret."
          else
            keytool -genkeypair \
              -alias eshipper-warehouse \
              -keyalg RSA -keysize 2048 -validity 9125 \
              -keystore android/keystore.jks \
              -storepass warehouse123 -keypass warehouse123 \
              -dname "CN=eShipper Warehouse,O=eShipper,C=CA" \
              -noprompt
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  NEW KEYSTORE GENERATED — save this as KEYSTORE_BASE64"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            base64 -w 0 android/keystore.jks
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          fi

      # ── Copy app icons from public/ into Android res ──────────────────────────
      - name: Copy app icons
        run: |
          for size in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-${size}
          done
          cp public/icon-192.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp public/icon-192.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp public/icon-192.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp public/icon-512.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp public/icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      # ── Build release APK via Gradle ─────────────────────────────────────────
      - name: Build APK
        working-directory: android
        env:
          APP_URL: ${{ steps.cloudrun.outputs.url }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'warehouse123' }}
          KEY_ALIAS: ${{ secrets.KEYSTORE_ALIAS || 'eshipper-warehouse' }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'warehouse123' }}
        run: |
          chmod +x gradlew 2>/dev/null || true
          gradle assembleRelease \
            -PappUrl="${APP_URL}/" \
            -PkeystoreFile="keystore.jks" \
            -PkeystorePassword="$KEYSTORE_PASSWORD" \
            -PkeyAlias="$KEY_ALIAS" \
            -PkeyPassword="$KEY_PASSWORD" \
            --no-daemon --stacktrace

      # ── Rename and upload APK ─────────────────────────────────────────────────
      - name: Rename APK
        run: |
          DATE=$(date +%Y-%m-%d)
          APK=$(find android -name "*.apk" | head -1)
          cp "$APK" "eshipper-warehouse-${DATE}.apk"
          echo "APK: eshipper-warehouse-${DATE}.apk ($(du -sh eshipper-warehouse-${DATE}.apk | cut -f1))"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eshipper-warehouse-apk
          path: eshipper-warehouse-*.apk
          retention-days: 30
