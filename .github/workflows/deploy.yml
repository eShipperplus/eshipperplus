name: Deploy to Cloud Run
on:
  push:
    branches: [main]
    paths:
      - 'server.js'
      - 'public/**'
      - 'package*.json'
      - 'Dockerfile'
      - 'cloudbuild.yaml'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push container image
        run: |
          BUILD_ID=$(gcloud builds submit \
            --config cloudbuild.yaml \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --async \
            --format="value(id)")
          echo "Build ID: $BUILD_ID"
          for i in $(seq 1 60); do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project ${{ secrets.GCP_PROJECT_ID }} \
              --format="value(status)")
            echo "[$i/60] Status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then echo "Build succeeded"; break; fi
            if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "TIMEOUT" ]; then
              echo "Build failed with status: $STATUS"; exit 1
            fi
            sleep 20
          done

      - name: Deploy Firestore indexes
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          deploy_index() {
            gcloud firestore indexes composite create "$@" \
              --project "$FIREBASE_PROJECT_ID" --quiet 2>&1 \
              | grep -v "already exists" || true
          }
          deploy_index \
            --collection-group=wh_jobs \
            --field-config=field-path=createdBy,order=ascending \
            --field-config=field-path=createdAt,order=descending
          deploy_index \
            --collection-group=wh_jobs \
            --field-config=field-path=assignedAssocId,array-config=contains \
            --field-config=field-path=createdAt,order=descending
          deploy_index \
            --collection-group=wh_jobs \
            --field-config=field-path=status,order=ascending \
            --field-config=field-path=createdAt,order=descending
          deploy_index \
            --collection-group=wh_jobs \
            --field-config=field-path=assignedManagerId,order=ascending \
            --field-config=field-path=createdAt,order=descending
          deploy_index \
            --collection-group=wh_audit \
            --field-config=field-path=jobId,order=ascending \
            --field-config=field-path=timestamp,order=descending

      - name: Write env vars file and update Cloud Run
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SA_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          python3 -c "import os,yaml; yaml.dump({'GCP_PROJECT':os.environ['FIREBASE_PROJECT_ID'],'FIREBASE_SERVICE_ACCOUNT':os.environ['FIREBASE_SA_JSON']},open('/tmp/ev.yaml','w'))"
          gcloud run services update warehouse-billing \
            --region northamerica-northeast2 \
            --project "$GCP_PROJECT_ID" \
            --env-vars-file /tmp/ev.yaml \
            --quiet
