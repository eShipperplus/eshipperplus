name: Deploy to Cloud Run
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push container image
        run: |
          gcloud builds submit \
            --config cloudbuild.yaml \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --suppress-logs \
            --async

      - name: Wait for Cloud Build to finish (poll every 20s, up to 10min)
        run: |
          for i in $(seq 1 30); do
            STATUS=$(gcloud builds list \
              --project ${{ secrets.GCP_PROJECT_ID }} \
              --limit=1 \
              --format="value(status)" 2>/dev/null || echo "UNKNOWN")
            echo "Build status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then break; fi
            if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            sleep 20
          done

      - name: Inject Firebase env vars into Cloud Run
        run: |
          gcloud run services update warehouse-billing \
            --region northamerica-northeast2 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --update-env-vars "GCP_PROJECT=${{ secrets.FIREBASE_PROJECT_ID }},FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SA_JSON }}" \
            --quiet
