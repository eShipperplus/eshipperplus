name: Deploy to Cloud Run
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push container image
        run: |
          gcloud builds submit \
            --config cloudbuild.yaml \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --suppress-logs \
            --async

      - name: Wait for Cloud Build to finish
        run: |
          for i in $(seq 1 30); do
            STATUS=$(gcloud builds list \
              --project ${{ secrets.GCP_PROJECT_ID }} \
              --limit=1 \
              --format="value(status)" 2>/dev/null || echo "UNKNOWN")
            echo "Build status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then break; fi
            if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build failed: $STATUS"; exit 1
            fi
            sleep 20
          done

      - name: Write env vars file and update Cloud Run
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SA_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          python3 -c "import os,yaml; yaml.dump({'GCP_PROJECT':os.environ['FIREBASE_PROJECT_ID'],'FIREBASE_SERVICE_ACCOUNT':os.environ['FIREBASE_SA_JSON']},open('/tmp/ev.yaml','w'))"
          gcloud run services update warehouse-billing \
            --region northamerica-northeast2 \
            --project "$GCP_PROJECT_ID" \
            --env-vars-file /tmp/ev.yaml \
            --quiet
